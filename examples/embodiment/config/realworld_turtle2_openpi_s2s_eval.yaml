defaults:
  - env/realworld_turtle2_deploy@env.train
  - env/realworld_turtle2_deploy@env.eval
  - model/pi0@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 2
  component_placement:
    actor:
      node_group: "4090"
      placement: 0-0
    rollout:
      node_group: "4090"
      placement: 0-0
    env:
      node_group: turtle2
      placement: 0
  node_groups:
    - label: "4090"
      node_ranks: 0-0
      env_configs:
        - node_ranks: 0-0
    - label: turtle2
      node_ranks: 1-1
      hardware:
        type: Turtle2
        configs:
          - node_rank: 1

runner:
  task_type: embodied
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: "turtle2-openpi-s2s-eval"
    logger_backends: ["tensorboard"]
  max_epochs: 1
  max_steps: 1
  only_eval: True
  val_check_interval: -1

algorithm:
  update_epoch: 1
  group_size: 1
  agg_q: min
  actor_agg_q: mean
  enable_drq: False
  backup_entropy: False
  critic_subsample_size: 2
  eval_rollout_epoch: 1
  adv_type: embodied_sac
  loss_type: embodied_sac
  loss_agg_func: "token-mean"
  bootstrap_type: standard
  gamma: 0.96
  tau: 0.01
  critic_actor_ratio: 1
  sampling_params:
    do_sample: True
    temperature_train: 1.0
    temperature_eval: 0.6
    top_k: 50
    top_p: 1.0
    repetition_penalty: 1.0
  length_params:
    max_new_token: 14
    max_length: 1024
    min_length: 1

env:
  group_name: "EnvGroup"
  enable_offload: False

rollout:
  group_name: "RolloutGroup"
  backend: "huggingface"
  recompute_logprobs: False
  enable_offload: False
  pipeline_stage_num: 1
  collect_transitions: False
  collect_prev_infos: False
  sync_weight_nccl_max_ctas: 32
  model:
    model_path: MODEL_PATH  # Replace with your checkpoint directory.
    precision: ${actor.model.precision}

critic:
  use_critic_model: False

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 1
  global_batch_size: 1
  seed: 1234
  enable_offload: True
  model:
    model_path: ${rollout.model.model_path}
    num_action_chunks: 30
    action_dim: 14
    add_value_head: False
    openpi:
      config_name: "pi0_turtle2_x2robot_s2s"
      num_images_in_input: 3
      action_chunk: ${actor.model.num_action_chunks}
      action_env_dim: ${actor.model.action_dim}
      train_expert_only: False
      detach_critic_input: False

reward:
  use_reward_model: False
