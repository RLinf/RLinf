# YAM bimanual robot – flowGRPO training with a Flow Matching policy.
#
# Algorithm: GRPO (Group Relative Policy Optimization) with a flow matching
#            actor (FlowPolicy).  Unlike SAC-Flow this is fully on-policy:
#            there is no replay buffer.
#
# Requires a 2-node setup:
#   node 0 – GPU node (actor training + rollout inference).
#             On Beaker, CUDA_VISIBLE_DEVICES may contain GPU UUIDs; RLinf
#             handles this transparently in NvidiaGPUManager.
#   node 1 – YAM robot controller node (env worker, no GPU required).
#             The robot connects via CAN bus, NOT TCP/IP.
#
# Before launching:
#   1. Replace left_ip / right_ip with actual arm IP addresses (used only for
#      network-reachability checks; robot control uses CAN bus).
#   2. Set robot_cfgs in env.train / env.eval to yam_realtime YAML paths.
#   3. Optionally configure camera_cfgs for your RealSense or OpenCV cameras.
#   4. Set rollout.model.model_path and actor.model.model_path to a pretrained
#      flow policy checkpoint (or leave empty to train from scratch).
#   5. Set runner.logger.log_path to a directory writable from the GPU node.

defaults:
  - env/yam@env.train
  - env/yam@env.eval
  - model/flow_policy@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 2
  component_placement:
    actor:
      node_group: "gpu"
      placement: 0   # First GPU on the GPU node
    env:
      node_group: yam
      placement: 0   # First (and only) YAM robot
    rollout:
      node_group: "gpu"
      placement: 0   # Same GPU as actor; rollout and actor share the card
  node_groups:
    - label: "gpu"
      node_ranks: 0  # Node rank 0 is the GPU / Beaker node
    - label: yam
      node_ranks: 1  # Node rank 1 is the YAM robot controller machine
      hardware:
        type: YAM
        configs:
          - node_rank: 1
            left_ip: 192.168.1.10   # Replace: left arm reachability check IP
            right_ip: 192.168.1.11  # Replace: right arm reachability check IP
            # camera_serials: null  # null = auto-detect all connected RealSense cameras
            disable_validate: False

runner:
  task_type: embodied
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: "yam_flowgrpo"
    logger_backends: ["tensorboard"]  # options: tensorboard, wandb, swanlab

  max_epochs: 2000
  max_steps: -1

  only_eval: False
  val_check_interval: -1
  save_interval: 50

  resume_dir: null   # Path to checkpoint directory to resume from
  ckpt_path: null    # Path to a .pt checkpoint for evaluation

algorithm:
  normalize_advantages: True
  kl_penalty: kl
  # group_size: number of trajectories collected per GRPO group.
  # Keep small (2–4) for real hardware to limit wall-clock collection cost.
  group_size: 4
  reward_coef: 1.0

  rollout_epoch: 4   # Must equal group_size so each group is fully collected
  eval_rollout_epoch: 1

  reward_type: chunk_level
  logprob_type: chunk_level
  entropy_type: token_level

  update_epoch: 2    # Gradient update passes per collected group
  adv_type: grpo     # GRPO advantage: normalised within-group relative reward
  loss_type: actor   # Actor-only loss (no value head for GRPO)
  loss_agg_func: "token-mean"
  kl_beta: 0.01      # Small KL penalty to prevent policy collapse
  entropy_bonus: 0
  clip_ratio_high: 0.2
  clip_ratio_low: 0.2
  clip_ratio_c: 3.0
  value_clip: 0.2
  huber_delta: 10.0

  gamma: 0.99
  gae_lambda: 0.95

  filter_rewards: False   # Disable reward filtering for real world
  rewards_lower_bound: 0.1
  rewards_upper_bound: 0.9

  sampling_params:
    do_sample: True
    temperature_train: 1.0
    temperature_eval: 0.6
    top_k: 50
    top_p: 1.0
    repetition_penalty: 1.0
    add_BOS: False

  length_params:
    max_new_token: null
    max_length: 1024
    min_length: 1

env:
  group_name: "EnvGroup"

  train:
    total_num_envs: 1
    group_size: ${algorithm.group_size}
    max_episode_steps: 100
    max_steps_per_rollout_epoch: 100
    control_rate_hz: 10.0
    task_description: "bimanual pick and place"  # Task text for VLA conditioning

    # Enable TOPReward dense progress signal.
    top_reward_enabled: True
    top_reward_max_frames: 16

    # --- YAM robot config (fill in before running) ---
    # robot_cfgs:
    #   left:  ["/path/to/yam_realtime/robot_configs/yam/left.yaml"]
    #   right: ["/path/to/yam_realtime/robot_configs/yam/right.yaml"]
    #
    # camera_cfgs:
    #   cam_front:
    #     _target_: yam_realtime.sensors.cameras.camera.CameraNode
    #     camera:
    #       _target_: yam_realtime.sensors.cameras.opencv_camera.OpencvCamera
    #       device_path: "/dev/video0"
    #       camera_type: "realsense_camera"

  eval:
    total_num_envs: 1
    max_episode_steps: 100
    max_steps_per_rollout_epoch: 100
    control_rate_hz: 10.0
    task_description: "bimanual pick and place"

# VLM planner for TOPReward scoring (placed on GPU node).
vlm_planner:
  model_path: "Qwen/Qwen3-VL-8B"
  backend: "transformers"
  dtype: "bfloat16"
  max_new_tokens_subtask: 64
  max_new_tokens_reward: 16
  max_memory_entries: 20
  success_threshold: 0.5
  top_reward_enabled: True
  top_reward_max_frames: 16

rollout:
  group_name: "RolloutGroup"
  backend: "huggingface"
  enable_offload: False
  pipeline_stage_num: 1

  collect_transitions: True
  collect_prev_infos: False

  model:
    # Path to a pretrained flow policy checkpoint, or empty string to train
    # from scratch (random initialisation).
    model_path: "/path/to/flow_policy_checkpoint"
    precision: ${actor.model.precision}

  enable_torch_compile: False  # Set True if not using Beaker (compile breaks with UUID GPUs on some drivers)
  enable_cuda_graph: False

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"

  micro_batch_size: 32
  global_batch_size: 32
  seed: 42
  enable_offload: False

  model:
    model_type: "flow_policy"
    # "mixed" = image + state input; required for real-world camera observations.
    input_type: "mixed"

    model_path: "/path/to/flow_policy_checkpoint"

    # YAM bimanual robot dimensions
    state_dim: 14       # 7 joints × 2 arms
    action_dim: 14      # 7 joint positions × 2 arms
    image_num: 1        # Number of camera inputs
    num_action_chunks: 1

    hidden_dim: 256
    precision: "32"
    add_value_head: False
    add_q_head: False   # No Q-head for GRPO (actor-only)
    num_q_heads: 0
    backbone: resnet

    ##-- Flow Matching specific parameters --##
    denoising_steps: 4            # Iterative refinement steps
    d_model: 256                  # Transformer hidden dimension
    n_head: 4                     # Number of attention heads
    n_layers: 2                   # Number of transformer layers
    use_batch_norm: False
    batch_norm_momentum: 0.99
    flow_actor_type: "JaxFlowTActor"  # Recommended; supports configurable noise std
    noise_std_head: False             # Use fixed noise std (not predicted)
    noise_std_train: 0.3              # Exploration noise during training
    noise_std_rollout: 0.02           # Low noise during rollout (exploitation)
    log_std_min_train: -5
    log_std_max_train: 2
    log_std_min_rollout: -20
    log_std_max_rollout: 0

    is_lora: False
    lora_rank: 32
    ckpt_path: null
    gradient_checkpointing: False
    sharding_strategy: no_shard
    vh_mode: "q_network"
    q_network_separate_processing: True

    encoder_config:
      ckpt_name: "resnet10_pretrained.pt"  # Download from RLinf/RLinf-ResNet10-pretrained

  optim:
    clip_grad: 1.0
    lr: 1e-4
    lr_scheduler: torch_constant

  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "no_shard"
    gradient_checkpointing: False
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

reward:
  use_reward_model: False

critic:
  use_critic_model: False
