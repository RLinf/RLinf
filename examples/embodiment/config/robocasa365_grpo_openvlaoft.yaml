# RoboCasa365 GRPO training with OpenVLA-OFT.
#
# Limitations (arm-only models on mobile-manipulation benchmark):
#   - OpenVLA-OFT outputs 7-DoF arm actions; the 12-DoF mobile-manipulation
#     action space is handled by action_utils.prepare_actions_for_robocasa()
#     which zero-pads the missing 5 base-control dimensions.
#   - Only the main camera (robot0_agentview_left) is consumed because
#     OpenVLA-OFT supports a single image input.
#   - Full mobile manipulation (base + arm) requires training an OpenVLA-OFT
#     variant with action_dim=12 and 3-view input on RoboCasa365 data.
#
defaults:
  - env/robocasa365@env.train
  - env/robocasa365@env.eval
  - model/openvla_oft@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - weight_syncer/patch_syncer@weight_syncer
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 1
  component_placement:
    actor,env,rollout: all

runner:
  task_type: embodied
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: "robocasa365_grpo_openvlaoft"
    logger_backends: ["tensorboard"]

  max_epochs: 1000
  max_steps: -1

  only_eval: False
  val_check_interval: -1
  save_interval: 50

  resume_dir: null
  ckpt_path: null

algorithm:
  normalize_advantages: True
  kl_penalty: kl

  group_size: 8

  reward_type: action_level
  logprob_type: token_level
  entropy_type: token_level

  adv_type: grpo
  loss_type: actor
  loss_agg_func: "token-mean"
  kl_beta: 0.0
  entropy_bonus: 0
  clip_ratio_high: 0.28
  clip_ratio_low: 0.2
  clip_ratio_c: 3.0
  value_clip: 0.2
  huber_delta: 10.0

  gamma: 0.99
  gae_lambda: 0.95

  reward_coef: 1.0

  filter_rewards: False
  rewards_lower_bound: 0.1
  rewards_upper_bound: 0.9

env:
  group_name: "EnvGroup"

  train:
    total_num_envs: 64
    split: pretrain
    task_soup: atomic_seen
    task_mode: atomic
    task_sampling_strategy: random
    max_episode_steps: 700
    max_steps_per_rollout_epoch: 700
    reward_coef: 1.0
    group_size: 8
    # Disable base control for arm-only models (required when action_dim < 12).
    action_space:
      disable_base_control: True

  eval:
    total_num_envs: 8
    split: target
    task_soup: atomic_seen
    task_mode: atomic
    task_sampling_strategy: ordered
    auto_reset: True
    ignore_terminations: True
    max_episode_steps: 700
    max_steps_per_rollout_epoch: 700
    group_size: 1
    is_eval: True
    action_space:
      disable_base_control: True
    video_cfg:
      save_video: True
      info_on_video: True
      video_base_dir: "../results/video/eval"

rollout:
  group_name: "RolloutGroup"
  generation_backend: "huggingface"
  enable_offload: True
  pipeline_stage_num: 1

  sampling_params:
    do_sample: True
    temperature_train: 1.6
    temperature_eval: 1.6
    top_k: -1
    top_p: 1.0
    repetition_penalty: 1.0

  model:
    model_path: "/path/to/model/openvla-oft-robocasa365"
    precision: ${actor.model.precision}

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 32
  global_batch_size: 16384
  seed: 1234
  enable_offload: True

  # Override model/openvla_oft defaults for RoboCasa365.
  model:
    model_path: "/path/to/model/openvla-oft-robocasa365"
    model_type: "openvla_oft"
    implement_version: "rlinf"
    precision: "bf16"
    value_type: action_level
    # Keep action_dim at 7 (arm-only).  action_utils zero-pads to 12 for the
    # mobile-manipulation environment.  Set to 12 only if the model is
    # specifically trained for RoboCasa365 full 12-DoF control.
    action_dim: 7
    num_action_chunks: 8
    use_proprio: False
    use_film: False
    unnorm_key: null
    center_crop: False
    max_prompt_length: 128
    num_images_in_input: 1
    attn_implementation: "flash_attention_2"
    low_cpu_mem_usage: True
    trust_remote_code: True

  optim:
    lr: 2.0e-5
    value_lr: 3.0e-3
    adam_beta1: 0.9
    adam_beta2: 0.999
    adam_eps: 1.0e-08
    weight_decay: 0.01
    clip_grad: 1.0

  fsdp_config:
    strategy: "fsdp"
    gradient_checkpointing: True
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

reward:
  use_reward_model: False

critic:
  use_critic_model: False
