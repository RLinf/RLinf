# SO101 RL training (online SAC). Defaults to dummy mode for validation;
# set is_dummy=False and configure cluster.node_groups.hardware to run on
# real hardware.
#
# Action space  : [q1..q5, gripper] in degrees (6-D continuous).
# Observation   : 5 arm joint positions + 1 gripper position (state_dim=6).
#
# Reward is end-effector-space by default (target_ee_pose in metres).
# Set target_ee_pose: null to fall back to joint-angle reward.
#
# Usage (dummy validation):
#   python examples/embodiment/train_embodied_agent.py \
#       --config-name realworld_so101_rl
#
# Usage (real hardware, single machine):
#   export SO101_PORT=/dev/ttyACM0
#   python examples/embodiment/train_embodied_agent.py \
#       --config-name realworld_so101_rl \
#       env.train.override_cfg.is_dummy=False \
#       env.eval.override_cfg.is_dummy=False

defaults:
  - env/realworld_so101@env.train
  - env/realworld_so101@env.eval
  - model/cnn_policy@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - weight_syncer/patch_syncer@weight_syncer
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 1
  component_placement:
    actor: 0-0
    env: 0-0
    rollout: 0-0

runner:
  task_type: embodied
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: "so101-rl"
    logger_backends: ["tensorboard"]

  max_epochs: 100
  max_steps: -1

  only_eval: False
  val_check_interval: 10
  save_interval: 10

  resume_dir: null
  ckpt_path: null

algorithm:
  update_epoch: 32
  group_size: 1
  agg_q: min
  actor_agg_q: mean

  rollout_epoch: 1
  eval_rollout_epoch: 1

  adv_type: embodied_sac
  loss_type: embodied_sac
  loss_agg_func: "token-mean"

  bootstrap_type: always
  gamma: 0.8
  tau: 0.01

  entropy_tuning:
    alpha_type: softplus
    initial_alpha: 0.01
    target_entropy: -6   # = -action_dim
    optim:
      lr: 3.0e-4
      lr_scheduler: torch_constant
      clip_grad: 10.0

  replay_buffer:
    enable_cache: True
    cache_size: 200
    sample_window_size: 200
    min_buffer_size: 1
    auto_save: False

  target_update_freq: 1

  sampling_params:
    do_sample: True
    temperature_train: 1.0
    temperature_eval: 0.6
    top_k: 50
    top_p: 1.0
    repetition_penalty: 1.0

  length_params:
    max_new_token: 6   # = action_dim
    max_length: 1024
    min_length: 1

env:
  group_name: "EnvGroup"

  train:
    total_num_envs: 1
    override_cfg:
      is_dummy: True

  eval:
    total_num_envs: 1
    override_cfg:
      is_dummy: True

rollout:
  group_name: "RolloutGroup"
  backend: "huggingface"
  enable_offload: False
  pipeline_stage_num: 1

  collect_transitions: True
  collect_prev_infos: False

  model:
    model_path: "/path/to/model"
    precision: ${actor.model.precision}

  enable_torch_compile: True
  enable_cuda_graph: False

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"

  micro_batch_size: 1024
  global_batch_size: 1024
  seed: 1234
  enable_offload: False

  model:
    model_path: "/path/to/model"
    state_dim: 6   # 5 arm joints + 1 gripper
    action_dim: 6  # 5 arm targets + 1 gripper target

  optim:
    clip_grad: 10.0
    lr: 3e-4
    lr_scheduler: torch_constant

  critic_optim:
    clip_grad: 10.0
    lr: 3e-4
    lr_scheduler: torch_constant

  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "no_shard"
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

reward:
  use_reward_model: False

critic:
  use_critic_model: False
