# RoboCasa365 PPO training with GR00T N1.7.
#
# Limitations: same arm-only constraints as robocasa365_ppo_gr00t.yaml.
# See that file for detailed notes.
#
defaults:
  - env/robocasa365@env.train
  - env/robocasa365@env.eval
  - model/gr00t_n1d7@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - weight_syncer/patch_syncer@weight_syncer
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 1
  component_placement:
    actor,env,rollout: all

runner:
  task_type: embodied
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: "robocasa365_ppo_gr00t_n1d7"
    logger_backends: ["tensorboard"]

  max_epochs: 1000
  max_steps: -1

  only_eval: False
  val_check_interval: -1
  save_interval: 100

  resume_dir: null
  ckpt_path: null

algorithm:
  normalize_advantages: True
  kl_penalty: kl
  group_size: 1
  reward_coef: 1.0

  reward_type: chunk_level
  logprob_type: chunk_level
  entropy_type: chunk_level

  update_epoch: 4
  adv_type: gae
  loss_type: actor_critic
  loss_agg_func: "token-mean"
  kl_beta: 0.0
  entropy_bonus: 0
  clip_ratio_high: 0.2
  clip_ratio_low: 0.2
  clip_ratio_c: 3.0
  value_clip: 0.2
  huber_delta: 10.0

  gamma: 0.99
  gae_lambda: 0.95

  filter_rewards: False
  rewards_lower_bound: 0.1
  rewards_upper_bound: 0.9

env:
  group_name: "EnvGroup"

  train:
    total_num_envs: 64
    split: pretrain
    task_soup: atomic_seen
    task_mode: atomic
    task_sampling_strategy: random
    max_episode_steps: 700
    max_steps_per_rollout_epoch: 700
    reward_coef: 1.0
    group_size: 1
    action_space:
      disable_base_control: True

  eval:
    total_num_envs: 8
    split: target
    task_soup: atomic_seen
    task_mode: atomic
    task_sampling_strategy: ordered
    auto_reset: True
    ignore_terminations: True
    max_episode_steps: 700
    max_steps_per_rollout_epoch: 700
    group_size: 1
    is_eval: True
    action_space:
      disable_base_control: True
    video_cfg:
      save_video: True
      video_base_dir: ${runner.logger.log_path}/video/eval

rollout:
  group_name: "RolloutGroup"
  backend: "huggingface"
  enable_offload: True
  pipeline_stage_num: 1

  model:
    model_path: "/path/to/model/gr00t-n1d7-robocasa365"
    precision: ${actor.model.precision}

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 128
  global_batch_size: 1024
  seed: 1234
  enable_offload: False

  model:
    model_path: "/path/to/model/gr00t-n1d7-robocasa365"
    model_type: "gr00t_n1d7"
    precision: "bf16"
    trust_remote_code: True
    is_lora: false
    # Keep action_dim at 7 (arm-only).  action_utils zero-pads to 12.
    action_dim: 7
    num_action_chunks: 16
    denoising_steps: 4
    obs_converter_type: "robocasa365"
    embodiment_tag: libero_sim
    add_value_head: True
    rl_head_config:
      joint_logprob: False
      noise_method: "flow_sde"
      ignore_last: False
      safe_get_logprob: False
      noise_anneal: False
      noise_params: [0.7, 0.3, 400]
      noise_level: 0.5
      action_noise_scale: 0.1
      add_value_head: ${..add_value_head}
      chunk_critic_input: False
      detach_critic_input: True
      disable_dropout: True
      use_vlm_value: False
      value_vlm_mode: "mean_token"
      padding_value: 570
    num_steps: 4

  optim:
    lr: 5.0e-6
    value_lr: 1.0e-4
    adam_beta1: 0.9
    adam_beta2: 0.95
    adam_eps: 1.0e-08
    weight_decay: 0.01
    clip_grad: 1.0
    critic_warmup_steps: 0

  fsdp_config:
    strategy: "fsdp"
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

reward:
  use_reward_model: False

critic:
  use_critic_model: False
