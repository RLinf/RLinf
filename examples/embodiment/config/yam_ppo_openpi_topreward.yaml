# YAM bimanual robot – PPO with TOPReward dense reward and π₀.5 (OpenPI) policy.
#
# Algorithm: PPO with GAE advantage, value head on VLM features, and dense
#            TOPReward progress signal computed via VLM True-token log-prob.
#
# TOPReward design:
#   The VLMPlannerWorker (Qwen3-VL-8B on Beaker) serves dual roles:
#     1. Subtask planning (optional, via subtask_interval).
#     2. Dense reward scoring — after each chunk step, a forward pass extracts
#        log p("True" | frames_1:t, instruction) as a progress score.
#        The reward delta r_t = score_t - score_{t-1} is injected into EnvOutput.
#
# Hardware topology (4 nodes):
#   node 0 – Desktop GPU (Robo room)
#             └── Rollout worker  (π₀.5 inference)
#   node 1 – YAM robot controller (Robo room)
#             └── Env worker  (YAMEnv → yam_realtime → CAN bus → arms)
#   node 2 – Beaker GPU (remote, job 1)
#             └── Actor worker  (π₀.5 FSDP training with value head)
#   node 3 – Beaker GPU (remote, job 2)
#             └── VLMPlannerWorker  (TOPReward scoring + subtask planning)
#
# Prerequisites:
#   pip install "transformers @ git+https://github.com/huggingface/transformers.git@main"
#   pip install qwen-vl-utils accelerate torchvision pillow  (on Beaker nodes)
#   huggingface-cli download Qwen/Qwen3-VL-8B
#   Set is_dummy: True in env.train / env.eval for initial e2e testing.

defaults:
  - env/yam@env.train
  - env/yam@env.eval
  - model/pi0_5@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 4
  component_placement:
    actor:
      node_group: "beaker_actor"
      placement: 0           # Beaker GPU job 1 — FSDP training
    rollout:
      node_group: "desktop_gpu"
      placement: 0
    env:
      node_group: yam
      placement: 0
  node_groups:
    - label: "desktop_gpu"
      node_ranks: 0
    - label: yam
      node_ranks: 1
      hardware:
        type: YAM
        configs:
          - node_rank: 1
            left_ip: 192.168.1.10
            right_ip: 192.168.1.11
            disable_validate: False
    - label: "beaker_actor"
      node_ranks: 2          # Set RLINF_NODE_RANK=2 on the actor Beaker job
    - label: "beaker_vlm"
      node_ranks: 3          # Set RLINF_NODE_RANK=3 on the VLM Beaker job

runner:
  task_type: embodied
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: "yam_ppo_openpi_topreward"
    logger_backends: ["tensorboard"]

  max_epochs: 2000
  max_steps: -1

  only_eval: False
  val_check_interval: -1
  save_interval: 50

  resume_dir: null
  ckpt_path: null

  weight_sync_interval: 1

algorithm:
  normalize_advantages: True
  kl_penalty: kl
  group_size: 1
  reward_coef: 1.0

  rollout_epoch: 1
  eval_rollout_epoch: 1

  reward_type: chunk_level
  logprob_type: chunk_level
  entropy_type: chunk_level

  update_epoch: 5
  adv_type: gae
  loss_type: actor_critic
  loss_agg_func: "token-mean"

  bootstrap_type: always
  kl_beta: 0.0
  entropy_bonus: 0.005
  clip_ratio_high: 0.2
  clip_ratio_low: 0.2
  clip_ratio_c: 3.0
  value_clip: 0.2
  huber_delta: 10.0

  gamma: 0.99
  gae_lambda: 0.95

  filter_rewards: False
  rewards_lower_bound: 0.0
  rewards_upper_bound: 1.0

  sampling_params:
    do_sample: True
    temperature_train: 1.0
    temperature_eval: 0.6
    top_k: 50
    top_p: 1.0
    repetition_penalty: 1.0
    add_BOS: False

  length_params:
    max_new_token: null
    max_length: 1024
    min_length: 1

env:
  group_name: "EnvGroup"

  train:
    total_num_envs: 1
    max_episode_steps: 100
    max_steps_per_rollout_epoch: 100
    control_rate_hz: 10.0

    task_description: "bimanual manipulation"

    # Enable TOPReward dense progress signal.
    top_reward_enabled: True
    top_reward_max_frames: 16

    # Subtask update interval (0 to disable VLM planning).
    subtask_interval: 30

    # Set is_dummy: True for initial e2e testing without real hardware.
    is_dummy: True

    # --- YAM robot config (fill in before running) ---
    # robot_cfgs:
    #   left:  ["/path/to/yam_realtime/robot_configs/yam/left.yaml"]
    #   right: ["/path/to/yam_realtime/robot_configs/yam/right.yaml"]
    #
    # camera_cfgs:
    #   cam_front:
    #     _target_: yam_realtime.sensors.cameras.camera.CameraNode
    #     camera:
    #       _target_: yam_realtime.sensors.cameras.opencv_camera.OpencvCamera
    #       device_path: "/dev/video0"
    #       camera_type: "realsense_camera"

  eval:
    total_num_envs: 1
    max_episode_steps: 100
    max_steps_per_rollout_epoch: 100
    control_rate_hz: 10.0
    task_description: "bimanual manipulation"

# VLM planner: Qwen3-VL-8B for both subtask planning and TOPReward scoring.
vlm_planner:
  model_path: "Qwen/Qwen3-VL-8B"
  backend: "transformers"
  dtype: "bfloat16"
  max_new_tokens_subtask: 64
  max_new_tokens_reward: 16
  max_memory_entries: 20
  success_threshold: 0.5
  top_reward_enabled: True
  top_reward_max_frames: 16

rollout:
  group_name: "RolloutGroup"
  generation_backend: "huggingface"
  recompute_logprobs: False
  unnorm_key: libero_10
  enable_offload: False
  pipeline_stage_num: 1

  collect_transitions: True
  collect_prev_infos: False

  model:
    model_path: "/path/to/model/RLinf-Pi05-SFT"
    precision: ${actor.model.precision}

  enable_torch_compile: False
  enable_cuda_graph: False

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"

  micro_batch_size: 16
  global_batch_size: 16
  seed: 42
  enable_offload: False

  model:
    model_path: "/path/to/model/RLinf-Pi05-SFT"
    model_type: "openpi"
    add_value_head: True
    num_action_chunks: 10
    num_steps: 4
    openpi:
      value_after_vlm: True
      value_vlm_mode: mean_token
      config_name: "pi05_libero"
      num_images_in_input: 1
      noise_method: "flow_noise"
      action_horizon: 10
      noise_params: [0.16, 0.12, 200]
      joint_logprob: True

  optim:
    lr: 5.0e-6
    value_lr: 1.55e-4
    adam_beta1: 0.9
    adam_beta2: 0.95
    adam_eps: 1.0e-08
    clip_grad: 1.0
    weight_decay: 0.01
    lr_scheduler: torch_constant
    critic_warmup_steps: 0

  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "no_shard"
    gradient_checkpointing: False
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

reward:
  use_reward_model: False
  reward_type: top_reward
  reward_scale: 1.0

critic:
  use_critic_model: False
