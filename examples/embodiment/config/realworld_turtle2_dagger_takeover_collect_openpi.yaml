defaults:
  - env/realworld_turtle2_deploy@env.train
  - env/realworld_turtle2_deploy@env.eval
  - model/pi0@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - _self_
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 2
  component_placement:
    actor:
      node_group: "gpu"
      placement: 0-0
    rollout:
      node_group: "gpu"
      placement: 0-0
    env:
      node_group: turtle2
      placement: 0
  node_groups:
    - label: "gpu"
      node_ranks: 0-0
      env_configs:
        - node_ranks: 0-0
    - label: turtle2
      node_ranks: 1-1
      hardware:
        type: Turtle2
        configs:
          - node_rank: 1

runner:
  task_type: embodied
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: "turtle2-dagger-takeover-collect-openpi"
    logger_backends: ["tensorboard"]
  max_epochs: 1
  max_steps: 1
  only_eval: True
  val_check_interval: -1
  save_interval: -1
  resume_dir: null
  ckpt_path: null

algorithm:
  update_epoch: 1
  group_size: 1
  agg_q: min
  actor_agg_q: mean
  enable_drq: False
  backup_entropy: False
  critic_subsample_size: 2
  eval_rollout_epoch: 1
  adv_type: embodied_sac
  loss_type: embodied_sac
  loss_agg_func: "token-mean"
  bootstrap_type: standard
  gamma: 0.96
  tau: 0.01
  critic_actor_ratio: 1
  sampling_params:
    do_sample: True
    temperature_train: 1.0
    temperature_eval: 0.6
    top_k: 50
    top_p: 1.0
    repetition_penalty: 1.0
  length_params:
    max_new_token: 14
    max_length: 1024
    min_length: 1

env:
  group_name: "EnvGroup"
  enable_offload: False
  train:
    override_cfg:
      task_description: "Collect Turtle2 takeover data."
  eval:
    total_num_envs: 1
    auto_reset: False
    ignore_terminations: False
    no_gripper: False
    use_spacemouse: False
    use_gello: False
    use_master_takeover: True
    action_mode: absolute_pose
    keyboard_reward_wrapper: single_stage
    main_image_key: wrist_2
    max_steps_per_rollout_epoch: 3000
    max_episode_steps: 3000
    data_collection:
      enabled: True
      save_dir: ${oc.env:RLINF_REALWORLD_DATA_DIR,../results/turtle2_takeover_rollouts}
      export_format: "pickle"
      only_success: False
      only_intervened: False
      robot_type: "turtle2"
      fps: 60
      finalize_interval: 1
    master_takeover:
      host: "0.0.0.0"
      port: 8765
      running_mode_source: "ros_param"
      running_mode_param: "/running_mode"
      normal_mode_value: 1
      takeover_mode_value: 2
      takeover_delay_s: 4.0
      slave_hold_settle_s: 0.5
      control_mode: pose
      max_pose_age_s: 0.25
      socket_timeout_s: 0.1
      accept_timeout_s: 0.1
      reconnect_sleep_s: 0.1
      debug_log: False
    override_cfg:
      task_description: "Collect Turtle2 takeover data."
      use_arm_ids: [0, 1]
      use_camera_ids: [0, 1, 2]
      enforce_gripper_close: false
      pose_control_backend: direct
      step_frequency: 60.0
      direct_publish_hz: 100.0
      reset_command_interval: 0.02
      reset_min_interpolation_steps: 75
      debug_pose_control: false
      debug_gripper_control: false
      reset_ee_pose:
        - [0.20, 0.00, 0.10, 0.00, 0.00, 0.00]
        - [0.20, 0.00, 0.10, 0.00, 0.00, 0.00]
      max_num_steps: 3000
      ee_pose_limit_min:
        - [-0.20, -0.60, -0.05, -3.20, -3.20, -3.20]
        - [-0.20, -0.60, -0.05, -3.20, -3.20, -3.20]
      ee_pose_limit_max:
        - [0.80, 0.60, 0.60, 3.20, 3.20, 3.20]
        - [0.80, 0.60, 0.60, 3.20, 3.20, 3.20]

rollout:
  group_name: "RolloutGroup"
  backend: "huggingface"
  recompute_logprobs: False
  enable_offload: False
  pipeline_stage_num: 1
  collect_transitions: False
  collect_prev_infos: False
  model:
    model_path: ${oc.env:RLINF_OPENPI_MODEL_PATH,/path/to/turtle2/openpi}
    precision: ${actor.model.precision}

critic:
  use_critic_model: False

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 1
  global_batch_size: 1
  seed: 1234
  enable_offload: True
  model:
    model_path: ${rollout.model.model_path}
    num_action_chunks: 30
    action_dim: 14
    add_value_head: False
    openpi:
      config_name: "pi0_turtle2_x2robot_s2s"
      num_images_in_input: 3
      action_chunk: ${actor.model.num_action_chunks}
      action_env_dim: ${actor.model.action_dim}
      train_expert_only: False
      detach_critic_input: False

reward:
  use_reward_model: False
