defaults:
  - env/libero_spatial@env.train
  - env/libero_spatial@env.eval
  - model/pi0_5@actor.model
  - hybrid_engines/fsdp@actor.fsdp_config
  - weight_syncer/patch_syncer@weight_syncer
  - override hydra/job_logging: stdout

cluster:
  num_nodes: 1
  component_placement:
    actor,env,rollout: 1

runner:
  task_type: embodied_eval
  rtc:
    enabled: True
    fixed_delay_steps: 0
    chunk_pause_seconds: 0.0
    min_exec_horizon: 2
    initial_delay_steps: 1
    delay_buffer_size: 8
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: "libero_spatial_rtc_pi05"
    logger_backends: ["tensorboard"]

  max_epochs: 1000
  max_steps: -1

  only_eval: True
  val_check_interval: -1
  save_interval: -1

  resume_dir: null
  ckpt_path: null

  per_worker_log: False
  per_worker_log_path: null
  weight_sync_interval: 1
  overlap_env_bootstrap: False

algorithm:
  normalize_advantages: True
  kl_penalty: kl
  group_size: 1
  reward_coef: 1.0

  reward_type: chunk_level
  logprob_type: chunk_level
  entropy_type: token_level
  update_epoch: 1

  adv_type: gae
  loss_type: actor_critic
  loss_agg_func: "token-mean"
  kl_beta: 0.0
  entropy_bonus: 0
  clip_ratio_high: 0.2
  clip_ratio_low: 0.2
  clip_ratio_c: 3.0
  value_clip: 0.2
  huber_delta: 10.0

  gamma: 0.99
  gae_lambda: 0.95

  filter_rewards: False
  rewards_lower_bound: 0.1
  rewards_upper_bound: 0.9

env:
  group_name: "EnvGroup"

  train:
    env_type: libero
    task_suite_name: libero_spatial
    total_num_envs: 1
    auto_reset: False
    ignore_terminations: False
    max_steps_per_rollout_epoch: 240
    max_episode_steps: 240
    use_rel_reward: True
    use_step_penalty: False
    reward_coef: 1.0
    reset_gripper_open: True
    is_eval: False
    seed: 0
    group_size: 1
    use_fixed_reset_state_ids: True
    use_ordered_reset_state_ids: False
    specific_reset_id: null
    video_cfg:
      save_video: True
      info_on_video: True
      video_base_dir: ${runner.logger.log_path}/video/train
    init_params:
      camera_heights: 256
      camera_widths: 256
    rollout_epoch: 1

  eval:
    env_type: libero
    task_suite_name: libero_spatial
    total_num_envs: 1
    auto_reset: False
    ignore_terminations: False
    max_steps_per_rollout_epoch: 240
    max_episode_steps: ${env.eval.max_steps_per_rollout_epoch}
    use_rel_reward: True
    use_step_penalty: False
    reward_coef: 1.0
    reset_gripper_open: True
    is_eval: True
    seed: 0
    group_size: 1
    use_fixed_reset_state_ids: True
    use_ordered_reset_state_ids: False
    specific_reset_id: null
    video_cfg:
      save_video: True
      info_on_video: True
      video_base_dir: ${runner.logger.log_path}/video/eval
    init_params:
      camera_heights: 256
      camera_widths: 256
    rollout_epoch: 1

rollout:
  group_name: "RolloutGroup"
  generation_backend: "huggingface"
  recompute_logprobs: False
  unnorm_key: libero_10
  enable_offload: False
  pipeline_stage_num: 1

  model:
    model_path: "/path/to/RLinf-Pi05-LIBERO-SFT/"
    model_type: "openpi"
    num_action_chunks: 5
    action_dim: 7
    rewrite_chunk_gripper: False
    precision: null
    is_lora: False
    openpi:
      config_name: "pi05_libero"
      num_images_in_input: 2
      noise_level: 0.5
      num_steps: 5
      action_horizon: ${rollout.model.num_action_chunks}
      action_chunk: ${rollout.model.num_action_chunks}
      train_expert_only: True
      action_env_dim: 7
      noise_method: "flow_sde"
      add_value_head: False
      value_after_vlm: False
      value_vlm_mode: "mean_token"
      detach_critic_input: null
      rtc_enabled: True
      rtc_guidance_mode: "approx"
      rtc_guidance_clip: 5.0

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 128
  global_batch_size: 2048
  seed: 42
  enable_offload: False

  model:
    model_type: "openpi"
    model_path: "/path/to/RLinf-Pi05-LIBERO-SFT/"
    precision: null
    num_action_chunks: ${rollout.model.num_action_chunks}
    action_dim: 7
    is_lora: False
    lora_rank: 32
    use_proprio: True
    num_steps: 3
    add_value_head: True
    openpi:
      config_name: "pi05_libero"
      num_images_in_input: 2
      noise_level: 0.5
      action_chunk: ${rollout.model.num_action_chunks}
      num_steps: 3
      train_expert_only: True
      action_env_dim: 7
      noise_method: "flow_sde"
      add_value_head: True
      value_after_vlm: True
      value_vlm_mode: "mean_token"
      detach_critic_input: null
      use_dsrl: False
      dsrl_state_dim: 8
      dsrl_action_noise_dim: 32
      dsrl_num_q_heads: 10
      dsrl_agg_q: "mean"
      dsrl_image_latent_dim: 64
      dsrl_state_latent_dim: 64
      dsrl_hidden_dims: [128, 128, 128]
      rtc_enabled: True
      rtc_guidance_mode: "approx"
      rtc_guidance_clip: 5.0
    rewrite_chunk_gripper: False

  optim:
    lr: 5.0e-6
    value_lr: 1.0e-4
    adam_beta1: 0.9
    adam_beta2: 0.95
    adam_eps: 1.0e-08
    weight_decay: 0.01
    clip_grad: 1.0
    critic_warmup_steps: 0

  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "no_shard"
    gradient_checkpointing: False
    cpu_offload: False
    offload_pin_memory: False
    reshard_after_forward: True
    enable_gradient_accumulation: True
    forward_prefetch: False
    limit_all_gathers: False
    backward_prefetch: null
    use_orig_params: False
    use_liger_kernel: False
    mixed_precision:
      param_dtype: null
      reduce_dtype: null
      buffer_dtype: null
    amp_autocast:
      enabled: False
      precision: "bf16"
    grad_scaler:
      enabled: False

reward:
  use_reward_model: False

critic:
  use_critic_model: False
