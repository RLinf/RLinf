defaults:
  - env/realworld_rlt_joint_peg_insertion@env.train
  - env/realworld_rlt_joint_peg_insertion@env.eval
  - model/rlt_stage2_joint@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - weight_syncer/patch_syncer@weight_syncer
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 2
  component_placement:
    actor:
      node_group: "4090"
      placement: 0
    rollout:
      node_group: "4090"
      placement: 0
    env:
      node_group: realworld
      placement: 0
  node_groups:
    - label: "4090"
      node_ranks: 0
    - label: realworld
      node_ranks: 1
      hardware:
        type: Franka
        configs:
          - robot_ip: "${oc.env:RLT_REALWORLD_ROBOT_IP,ROBOT_IP}"
            node_rank: 1

runner:
  task_type: embodied
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: "rlt_stage2_realworld_joint"
    logger_backends: ["tensorboard"]

  max_epochs: 5000
  max_steps: -1
  only_eval: False
  weight_sync_interval: 1
  val_check_interval: -1
  eval_before_train: False
  save_interval: 50
  resume_dir: null
  ckpt_path: null

algorithm:
  update_epoch: 5
  max_updates_per_train_step: 200
  # Warmup is collected online by executing the frozen realworld SFT/stage1
  # reference chunk. No offline demo_buffer is used in this realworld setup.
  warmup_min_size: 100
  warmup_post_collect_updates: 1000
  train_every_episodes: 0
  train_every_transitions: 1
  group_size: 1
  rollout_epoch: 1
  eval_rollout_epoch: 1
  adv_type: rlt_td3
  loss_type: rlt_td3
  loss_agg_func: "token-mean"
  actor_only_train_model: True
  gamma: 0.99
  tau: 0.005
  critic_actor_ratio: ${actor.model.rlt_stage2.critic_updates_per_actor}
  actor_loss_warmup_updates: 500
  actor_loss_ramp_updates: 2000
  target_update_freq: 1
  intervention:
    enable: True
    mode: human_override
  replay_buffer:
    enable_cache: True
    cache_size: 10000
    sample_window_size: 10000
    min_buffer_size: 100
    auto_save: False
  sampling_params:
    do_sample: True
    temperature_train: 1.0
    temperature_eval: 0.0
    top_k: 1
    top_p: 1.0
    repetition_penalty: 1.0
  length_params:
    max_new_token: null
    max_length: 1024
    min_length: 1

env:
  group_name: "EnvGroup"
  train:
    total_num_envs: 1
    seed: 20260609
    auto_reset: True
    ignore_terminations: False
    reward_mode: raw
    max_episode_steps: 100
    max_steps_per_rollout_epoch: 100
    video_cfg:
      save_video: True
      fps: 10
      record_every: 1
      video_base_dir: ${runner.logger.log_path}/video/train
  eval:
    total_num_envs: 1
    seed: 20260609
    auto_reset: True
    ignore_terminations: False
    reward_mode: raw
    max_episode_steps: 100
    max_steps_per_rollout_epoch: 100
    policy_mode: eval
    action_exec_chunks: 10
    video_cfg:
      save_video: True
      fps: 10
      record_every: 1
      video_base_dir: ${runner.logger.log_path}/video/eval

rollout:
  group_name: "RolloutGroup"
  backend: "huggingface"
  enable_offload: False
  pipeline_stage_num: 1
  collect_transitions: True
  collect_prev_infos: True
  model:
    model_path: ${actor.model.model_path}
    precision: ${actor.model.precision}
  enable_torch_compile: False
  enable_cuda_graph: False

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 32
  global_batch_size: 128
  seed: 1234
  enable_offload: False
  model:
    model_path: "${oc.env:RLT_REALWORLD_STAGE2_BASE_PATH,/path/to/rlt_realworld_joint_pi05_sft_or_stage1/checkpoints/global_step_xxx/actor}"
    precision: null
    load_to_device: True
    num_action_chunks: 10
    action_dim: 8
    add_value_head: False
    policy_setup: "panda-qpos"
    num_steps: 5
    rlt_stage2:
      config_name: "pi05_rlt_realworld_joint"
      norm_stats_path: "${oc.env:RLT_REALWORLD_NORM_STATS_PATH,data/rlt_id3_id4_dataset/collected_data_id3_id4/rank_0/id_3/norm_stats.json}"
      rl_token_path: "${oc.env:RLT_REALWORLD_STAGE1_RL_TOKEN_PATH,/path/to/rlt_stage1_realworld_joint/checkpoints/global_step_xxx/actor/rl_token/rl_token_model.pt}"
      num_images_in_input: 2
      proprio_mode: joint_pos_gripper
      proprio_dim: 8
      embedding_dim: 2048
      encoder_layers: 2
      encoder_heads: 8
      decoder_layers: 2
      decoder_heads: 8
      mlp_hidden_dim: 256
      mlp_num_hidden_layers: 2
      actor_noise_sigma: 0.002
      ref_action_dropout: 0.5
      bc_regularizer_beta: 3.0
      warmup_bc_weight: 7.0
      warmup_q_weight: 0.05
      online_bc_weight: 2.7
      online_q_weight: 0.13
      delta_weight: 0.1
      critic_updates_per_actor: 2
      replay_subsample_stride: 0
      replay_allow_terminal_partial: True
      replay_feature_batch_size: 8
      buffer_capacity: 20000
      tau: 0.005
      gamma: 0.99

  optim:
    clip_grad: 10.0
    lr: 5.0e-5
    lr_scheduler: torch_constant

  critic_optim:
    clip_grad: 10.0
    lr: 5.0e-5
    lr_scheduler: torch_constant

  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "no_shard"
    use_orig_params: True
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

reward:
  use_reward_model: False

critic:
  use_critic_model: False
