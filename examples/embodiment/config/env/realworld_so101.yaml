# SO101 arm environment config.
# This config defines the environment settings for the SO101 6-DOF arm.
# The SO101 uses LeRobot under the hood for hardware control.

env_type: realworld

total_num_envs: null

auto_reset: True
ignore_terminations: True
reward_mode: raw
wrap_obs_mode: simple
seed: 0
group_size: 1
use_fixed_reset_state_ids: False
max_steps_per_rollout_epoch: 100
max_episode_steps: 150
use_spacemouse: False
main_image_key: camera_0

video_cfg:
  save_video: False
  info_on_video: True
  video_base_dir: ${runner.logger.log_path}/video/train

init_params:
  id: "SO101PickEnv-v1"
  num_envs: null
