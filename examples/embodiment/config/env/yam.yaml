# YAM bimanual robot environment configuration.
#
# This config is used with YAMEnv (rlinf/envs/yam/yam_env.py).
#
# Robot arms connect via CAN bus on the robot controller node.  Supply
# yam_realtime-compatible YAML config file paths for each arm via
# `robot_cfgs`.  Cameras are optional and use yam_realtime CameraNode
# configs (OpenCV device paths) via `camera_cfgs`.
#
# The cluster hardware section (hardware.type: YAM) supplies left_ip /
# right_ip for network-reachability checks only — not for robot connection.

env_type: yam

total_num_envs: null

# Episode settings
max_episode_steps: 100
max_steps_per_rollout_epoch: 100

# Robot control
control_rate_hz: 10.0

# Camera / image settings
img_height: 224
img_width: 224
# Key used to select the primary camera image from observations.
# Must match (or be a prefix of) one of the keys in camera_cfgs below.
main_camera: "cam_"

# Human-readable task description injected into observations (used by VLA models).
task_description: ""

# Set to True to run without real hardware (returns zero observations).
is_dummy: False

# Auto-reset and termination handling (matches RealWorldEnv contract).
auto_reset: False
ignore_terminations: True

# TOPReward dense reward configuration.
# When enabled, the env worker queries the VLM planner for a progress score
# after each chunk step and injects the delta as a dense reward.
top_reward_enabled: False
top_reward_max_frames: 16

# Robot config file paths (required when is_dummy: False).
# Each value is a list of yam_realtime YAML config files for that arm,
# passed to yam_realtime.utils.launch_utils.initialize_robots().
# Example:
#   robot_cfgs:
#     left:  ["/path/to/yam_realtime/robot_configs/yam/left.yaml"]
#     right: ["/path/to/yam_realtime/robot_configs/yam/right.yaml"]
robot_cfgs: null

# Camera configs (optional).  Mapping of camera name to yam_realtime
# CameraNode configuration dict, passed to initialize_sensors().
# Camera names prefixed with "cam_" are matched by the default main_camera.
# Example:
#   camera_cfgs:
#     cam_front:
#       _target_: yam_realtime.sensors.cameras.camera.CameraNode
#       camera:
#         _target_: yam_realtime.sensors.cameras.opencv_camera.OpencvCamera
#         device_path: "/dev/video0"
#         camera_type: "realsense_camera"
camera_cfgs: null

video_cfg:
  save_video: False
  info_on_video: True
  video_base_dir: ${runner.logger.log_path}/video/train
