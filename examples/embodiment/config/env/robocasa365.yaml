env_type: robocasa365

# RoboCasa365 benchmark selection
task_source: dataset_registry
dataset_source: human
split: pretrain
task_soup: atomic_seen
task_mode: atomic
task_filter: []
task_sampling_strategy: random
rotate_tasks_on_auto_reset: True

# Robot configuration
robot_name: PandaOmron

# Camera configuration
camera_names:
  - robot0_agentview_left
  - robot0_eye_in_hand
  - robot0_agentview_right
render_camera: robot0_agentview_left
has_renderer: False
has_offscreen_renderer: True
ignore_done: True
use_object_obs: True
use_camera_obs: True
camera_depths: False

total_num_envs: null

auto_reset: False
ignore_terminations: False
episode_horizon_source: task_horizon # For training, max_episode_steps is recommended.
max_steps_per_rollout_epoch: 300
max_episode_steps: 300
use_fixed_reset_state_ids: False
use_ordered_reset_state_ids: False

use_rel_reward: True
reward_coef: 1.0
is_eval: False

seed: 0
group_size: 1
seed_strategy: worker_offset

video_cfg:
  save_video: False
  info_on_video: True
  video_base_dir: "../results/video/train"

init_params:
  camera_heights: 224
  camera_widths: 224

observation:
  main_camera_key: robot0_agentview_left_image
  wrist_camera_key: robot0_eye_in_hand_image
  extra_camera_keys:
    - robot0_agentview_right_image
  flip_images_vertical: True
  state_layout:
    - eef_pos
    - eef_quat
    - gripper_qpos
    - gripper_qvel
    - base_to_eef_pos
    - base_to_eef_quat
    - base_pos
    - base_quat
  state_key_map:
    eef_pos: robot0_eef_pos
    eef_quat: robot0_eef_quat
    gripper_qpos: robot0_gripper_qpos
    gripper_qvel: robot0_gripper_qvel
    base_to_eef_pos: robot0_base_to_eef_pos
    base_to_eef_quat: robot0_base_to_eef_quat
    base_pos: robot0_base_pos
    base_quat: robot0_base_quat

# Action layout used by the OpenPI RoboCasa365 checkpoint. Keep these defaults
# unless the checkpoint outputs a different action layout or you intentionally
# want to disable mobile-base commands.
action_space:
  # RoboCasa365 expects a 12D environment action.
  env_action_dim: 12
  # Use OpenPI action dimensions [0, 12) as the 12D environment action.
  openpi_valid_action_slice: [0, 12]
  # When true, the adapter zeros base translation/rotation commands.
  disable_base_control: False
  # Sentinel dimension set to -1.0 when disable_base_control is true.
  base_mode_index: 11
  # Convert gripper outputs from [0, 1] to {-1, 1} before env.step().
  binarize_gripper_control: True
