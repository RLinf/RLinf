# YAM bimanual robot – FlowGRPO training with π₀.5 (OpenPI) policy.
#
# Algorithm: GRPO (Group Relative Policy Optimization) with π₀.5's flow
#            matching action head via ODE-SDE mixing (FlowGRPO / flow_sde).
#            The action trajectory is made stochastic by injecting Gaussian
#            noise at a randomly sampled denoising step, giving a tractable
#            log-probability for the PPO ratio.
#
# Hardware topology (3 nodes):
#   node 0 – Desktop GPU (Robo room)
#             └── Rollout worker  (π₀.5 inference; 7B inference-only VRAM)
#   node 1 – YAM robot controller (Robo room)
#             └── Env worker  (YAMEnv → yam_realtime → CAN bus → arms)
#   node 2 – Beaker GPU (remote server)
#             └── Actor worker  (π₀.5 FSDP training; backward pass + optimizer)
#
# The rollout worker (node 0) does inference-only; the actor worker (node 2)
# handles the full forward+backward pass with FSDP.  Updated weights are
# synced from actor → rollout at weight_sync_interval steps.
#
# Before launching:
#   1. Replace left_ip / right_ip with actual arm IP addresses.
#   2. Set rollout.model.model_path and actor.model.model_path to your
#      π₀.5 SFT checkpoint (e.g. RLinf-Pi05-SFT).
#   3. Set RLINF_NODE_RANK=0/1/2 on each machine and start Ray.
#   4. Set is_dummy: True in env.train / env.eval for initial e2e testing.
#   5. See examples/embodiment/run_realworld.sh for launch instructions.
#
# Note on π₀.5 config_name: "pi05_libero" is used here.  If your YAM camera
# setup differs from Libero's 2-image + 7D-state layout you may need to add a
# "pi05_yam" branch in rlinf/models/embodiment/openpi/openpi_action_model.py.

defaults:
  - env/yam@env.train
  - env/yam@env.eval
  - model/pi0_5@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 3
  component_placement:
    actor:
      node_group: "beaker"
      placement: 0           # Beaker GPU(s) — full FSDP training pass
    rollout:
      node_group: "desktop_gpu"
      placement: 0           # Desktop GPU — inference only
    env:
      node_group: yam
      placement: 0           # YAM robot controller node
  node_groups:
    - label: "desktop_gpu"
      node_ranks: 0          # Set RLINF_NODE_RANK=0 on the desktop GPU machine
    - label: yam
      node_ranks: 1          # Set RLINF_NODE_RANK=1 on the robot controller
      hardware:
        type: YAM
        configs:
          - node_rank: 1
            left_ip: 192.168.1.10   # Replace: left arm reachability check IP
            right_ip: 192.168.1.11  # Replace: right arm reachability check IP
            # camera_serials: null  # null = auto-detect all connected RealSense cameras
            disable_validate: False
    - label: "beaker"
      node_ranks: 2          # Set RLINF_NODE_RANK=2 on the Beaker machine

runner:
  task_type: embodied
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: "yam_grpo_openpi"
    logger_backends: ["tensorboard"]  # options: tensorboard, wandb, swanlab

  max_epochs: 2000
  max_steps: -1

  only_eval: False
  val_check_interval: -1
  save_interval: 50

  resume_dir: null
  ckpt_path: null

  # Sync rollout weights from actor every step.  Increase to amortise cost.
  weight_sync_interval: 1

algorithm:
  normalize_advantages: True
  kl_penalty: kl
  # group_size: number of sequential episodes per GRPO group.
  # Keep small (2–4) for real hardware to limit wall-clock collection cost.
  # With total_num_envs=1, group_size sequential rollouts are collected before
  # each gradient update.  group_size=1 causes zero std → zero advantages;
  # minimum viable value is 2.
  group_size: 4
  reward_coef: 1.0

  rollout_epoch: 4   # Must equal group_size
  eval_rollout_epoch: 1

  reward_type: chunk_level
  logprob_type: chunk_level
  entropy_type: token_level

  update_epoch: 2    # Gradient update passes per collected group
  adv_type: grpo     # GRPO advantage: normalised within-group relative reward
  loss_type: actor   # Actor-only (no value head for GRPO)
  loss_agg_func: "token-mean"
  kl_beta: 0.01      # Small KL penalty to prevent policy collapse
  entropy_bonus: 0
  clip_ratio_high: 0.2
  clip_ratio_low: 0.2
  clip_ratio_c: 3.0
  value_clip: 0.2
  huber_delta: 10.0

  gamma: 0.99
  gae_lambda: 0.95

  filter_rewards: False   # Disable reward filtering for real world
  rewards_lower_bound: 0.1
  rewards_upper_bound: 0.9

  sampling_params:
    do_sample: True
    temperature_train: 1.0
    temperature_eval: 0.6
    top_k: 50
    top_p: 1.0
    repetition_penalty: 1.0
    add_BOS: False

  length_params:
    max_new_token: null
    max_length: 1024
    min_length: 1

env:
  group_name: "EnvGroup"

  train:
    total_num_envs: 1
    group_size: ${algorithm.group_size}
    max_episode_steps: 100
    max_steps_per_rollout_epoch: 100
    control_rate_hz: 10.0
    task_description: "bimanual pick and place"

    # Set is_dummy: True for initial end-to-end testing without real hardware.
    # is_dummy: True

    # --- YAM robot config (fill in before running) ---
    # robot_cfgs:
    #   left:  ["/path/to/yam_realtime/robot_configs/yam/left.yaml"]
    #   right: ["/path/to/yam_realtime/robot_configs/yam/right.yaml"]
    #
    # camera_cfgs:
    #   cam_front:
    #     _target_: yam_realtime.sensors.cameras.camera.CameraNode
    #     camera:
    #       _target_: yam_realtime.sensors.cameras.opencv_camera.OpencvCamera
    #       device_path: "/dev/video0"
    #       camera_type: "realsense_camera"

  eval:
    total_num_envs: 1
    max_episode_steps: 100
    max_steps_per_rollout_epoch: 100
    control_rate_hz: 10.0
    task_description: "bimanual pick and place"

rollout:
  group_name: "RolloutGroup"
  generation_backend: "huggingface"
  recompute_logprobs: False
  # unnorm_key must match the normalization statistics embedded in the
  # SFT checkpoint.  "libero_10" is correct for RLinf-Pi05-SFT.
  unnorm_key: libero_10
  enable_offload: False
  pipeline_stage_num: 1

  collect_transitions: True
  collect_prev_infos: False

  model:
    model_path: "/path/to/model/RLinf-Pi05-SFT"
    precision: ${actor.model.precision}

  enable_torch_compile: False  # Set True if not running on Beaker UUID GPUs
  enable_cuda_graph: False

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"

  micro_batch_size: 16
  global_batch_size: 16
  seed: 42
  enable_offload: False

  model:
    model_path: "/path/to/model/RLinf-Pi05-SFT"
    num_steps: 4   # Fewer denoising steps = faster rollout for real-world

  optim:
    lr: 5.0e-6
    adam_beta1: 0.9
    adam_beta2: 0.95
    adam_eps: 1.0e-08
    clip_grad: 1.0
    weight_decay: 0.01
    lr_scheduler: torch_constant

  fsdp_config:
    strategy: "fsdp"
    # no_shard: fits on a single Beaker GPU for inference VRAM.
    # Switch to full_shard if OOM during backward pass.
    sharding_strategy: "no_shard"
    gradient_checkpointing: False  # not supported for openpi
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

reward:
  use_reward_model: False

critic:
  use_critic_model: False
