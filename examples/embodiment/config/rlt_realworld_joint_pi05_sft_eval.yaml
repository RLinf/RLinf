defaults:
  - env/realworld_rlt_joint_peg_insertion@env.train
  - env/realworld_rlt_joint_peg_insertion@env.eval
  - model/pi0_5@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - weight_syncer/patch_syncer@weight_syncer
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 2
  component_placement:
    actor:
      node_group: "4090"
      placement: 0
    rollout:
      node_group: "4090"
      placement: 0
    env:
      node_group: realworld
      placement: 0
  node_groups:
    - label: "4090"
      node_ranks: 0
    - label: realworld
      node_ranks: 1
      hardware:
        type: Franka
        configs:
          - robot_ip: "${oc.env:RLT_REALWORLD_ROBOT_IP,ROBOT_IP}"
            node_rank: 1

runner:
  task_type: embodied
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: "rlt_realworld_joint_pi05_sft_eval"
    logger_backends: ["tensorboard"]

  only_eval: True
  max_epochs: 1
  max_steps: 1
  val_check_interval: -1
  save_interval: -1

  resume_dir: null
  ckpt_path: null

algorithm:
  normalize_advantages: True
  kl_penalty: kl
  group_size: 1
  reward_coef: 1.0

  rollout_epoch: 1
  eval_rollout_epoch: 1
  reward_type: chunk_level
  logprob_type: chunk_level
  entropy_type: chunk_level
  update_epoch: 1

  adv_type: gae
  loss_type: actor
  loss_agg_func: "token-mean"

  bootstrap_type: always
  kl_beta: 0.0
  entropy_bonus: 0.0
  clip_ratio_high: 0.2
  clip_ratio_low: 0.2
  clip_ratio_c: 3.0
  value_clip: 0.2
  huber_delta: 10.0

  gamma: 0.99
  gae_lambda: 0.95

  filter_rewards: False
  rewards_lower_bound: 0.0
  rewards_upper_bound: 1.0

  sampling_params:
    do_sample: True
    temperature_train: 1.0
    temperature_eval: 0.0
    top_k: 1
    top_p: 1.0
    repetition_penalty: 1.0
    add_BOS: False

  length_params:
    max_new_token: null
    max_length: 1024
    min_length: 1

env:
  group_name: "EnvGroup"

  train:
    total_num_envs: 1
    auto_reset: True
    ignore_terminations: True
    max_episode_steps: 100
    max_steps_per_rollout_epoch: 100
    use_gello: False
    use_spacemouse: False

  eval:
    total_num_envs: 1
    seed: 20260609
    auto_reset: True
    ignore_terminations: False
    reward_mode: raw
    max_episode_steps: 100
    max_steps_per_rollout_epoch: 100
    policy_mode: eval
    action_exec_chunks: 10
    group_size: 1
    use_gello: False
    use_spacemouse: False
    video_cfg:
      save_video: True
      fps: 10
      record_every: 1
      video_base_dir: ${runner.logger.log_path}/video/eval

rollout:
  group_name: "RolloutGroup"
  backend: "huggingface"
  enable_offload: False
  pipeline_stage_num: 1
  collect_transitions: False
  collect_prev_infos: True
  model:
    model_path: ${actor.model.model_path}
    precision: ${actor.model.precision}
  enable_torch_compile: False
  enable_cuda_graph: False

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 8
  global_batch_size: 8
  seed: 0
  enable_offload: False

  model:
    model_path: "/mnt/public2/xiekaizhi/rlt-openpi-sim/clean-RLinf/RLinf-dev/logs/20260610-10:20:02-rlt_realworld_joint_pi05_sft/rlt_realworld_joint_pi05_sft/checkpoints/global_step_5000/actor"
    precision: null
    model_type: "openpi"
    num_action_chunks: 10
    action_dim: 8
    use_proprio: True
    add_value_head: False
    num_steps: 5
    policy_setup: "panda-qpos"
    openpi:
      config_name: "pi05_rlt_realworld_joint"
      num_images_in_input: 2
      train_expert_only: False
      detach_critic_input: True
      action_horizon: 10
      action_chunk: ${actor.model.num_action_chunks}
      action_env_dim: ${actor.model.action_dim}
    openpi_data:
      repo_id: "data/collected_data_id3_id4/rank_0/id_4"
      norm_stats_path: "/mnt/public2/xiekaizhi/rlt-openpi-sim/data/collected_data_id3_id4/rank_0/id_4/norm_stats.json"
      default_prompt: "insert the peg in the hole"

  optim:
    lr: 2.5e-5
    value_lr: 1.55e-4
    adam_beta1: 0.9
    adam_beta2: 0.95
    adam_eps: 1.0e-08
    weight_decay: 1.0e-10
    clip_grad: 1.0
    total_training_steps: 5000
    lr_warmup_steps: 500
    lr_scheduler: "cosine"
    num_cycles: 0.5
    min_lr: 2.5e-6

  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "no_shard"
    use_orig_params: False
    gradient_checkpointing: False
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

reward:
  use_reward_model: False

critic:
  use_critic_model: False
