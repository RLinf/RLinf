# GRPO for Evo-1 (evo1-flash) on LIBERO-Spatial.
#
# Flow-matching RL via SDE-replay (GRPO-first): the rollout turns Evo-1's
# deterministic denoising ODE into an SDE (one stochastic step), stores the
# denoising chain, and the actor replays it to recompute log-probs. See
# rlinf/models/embodiment/evo1/evo1_rl_head.py and model/evo1.yaml:rl_head_config.
#
# NOTE: Evo-1 recomputes the full InternVL VLM forward per train step; the VLM
# backward is heavy. Start small (few envs, small micro-batch); consider freezing
# the VLM for the first runs. Set EVO1_REPO_PATH (or actor.model.evo1.repo_path).

defaults:
  - env/libero_spatial@env.train
  - env/libero_spatial@env.eval
  - model/evo1@actor.model
  - hybrid_engines/fsdp@actor.fsdp_config
  - weight_syncer/patch_syncer@weight_syncer
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 1
  component_placement:
    actor,env,rollout: all

runner:
  task_type: embodied
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: "libero_spatial_grpo_evo1"
    logger_backends: ["tensorboard"] # wandb, swanlab

  max_epochs: 1000
  max_steps: -1

  only_eval: False
  val_check_interval: -1
  save_interval: 40

  resume_dir: null
  ckpt_path: null

algorithm:
  normalize_advantages: True
  kl_penalty: kl
  group_size: 8
  reward_coef: 1.0

  reward_type: chunk_level
  # token_level: per-dim PPO ratio. chunk_level sums logprob over all
  # num_action_chunks*valid_dim (14*7=98) dims -> ratio=exp(sum) explodes for a
  # long chunk, so token_level is the stable choice for Evo-1's 14-step chunk.
  logprob_type: token_level
  entropy_type: token_level

  update_epoch: 2
  adv_type: grpo          # critic-free
  loss_type: actor        # actor-only (no value head)
  loss_agg_func: "token-mean"
  kl_beta: 0.0
  entropy_bonus: 0        # Evo-1 flow head returns entropy=None; keep 0
  clip_ratio_high: 0.28   # clip-higher: sustains improvement, avoids drift
  clip_ratio_low: 0.2
  clip_ratio_c: 3.0
  value_clip: 0.2
  huber_delta: 10.0

  gamma: 0.99
  gae_lambda: 0.95

  filter_rewards: True
  rewards_lower_bound: 0.1
  rewards_upper_bound: 0.9

env:
  group_name: "EnvGroup"

  train:
    rollout_epoch: 8
    total_num_envs: 64           # 64 // 8 GPUs = 8 env/worker -> group_size=8 valid
    group_size: ${algorithm.group_size}
    max_episode_steps: 252  # multiple of num_action_chunks=14 (14*18)
    max_steps_per_rollout_epoch: 252  # divisible by num_action_chunks=14
  eval:
    rollout_epoch: 1
    total_num_envs: 120
    auto_reset: True
    ignore_terminations: True
    max_episode_steps: 252  # multiple of num_action_chunks=14 (14*18)
    max_steps_per_rollout_epoch: 252  # divisible by num_action_chunks=14
    group_size: 1
    is_eval: True
    video_cfg:
      save_video: True
      video_base_dir: ${runner.logger.log_path}/video/eval

rollout:
  group_name: "RolloutGroup"
  generation_backend: "huggingface"
  recompute_logprobs: False      # GRPO uses the rollout-time prev_logprobs
  unnorm_key: libero_10          # unused by Evo-1 (its Normalizer keys on arm/dataset_key)
  enable_offload: False
  pipeline_stage_num: 1

  model:
    model_path: "/data/oss_bucket_0/data/taolin/checkpoints/Evo1/Evo1_libero"
    precision: ${actor.model.precision}

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 16
  global_batch_size: 256
  seed: 42
  enable_offload: False

  model:
    model_path: "/data/oss_bucket_0/data/taolin/checkpoints/Evo1/Evo1_libero"
    num_action_chunks: 14        # interface for the env (Evo-1 LIBERO)
    # rl_head_config is defined in model/evo1.yaml (joint_logprob / noise_level /
    # denoising_steps / add_value_head). Override here if needed.

  optim:
    lr: 5.0e-6
    value_lr: 1.0e-4
    adam_beta1: 0.9
    adam_beta2: 0.95
    adam_eps: 1.0e-08
    weight_decay: 0.01
    clip_grad: 1.0

  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "no_shard"
    gradient_checkpointing: False
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

reward:
  use_reward_model: False

critic:
  use_critic_model: False
