# YAM bimanual robot – PPO training with π₀ (OpenPI) policy.
#
# Requires a 2-node setup:
#   node 0 – GPU node (actor + rollout)
#   node 1 – Robot controller node (env worker + YAM hardware)
#
# Before launching:
#   1. Replace left_ip / right_ip with the actual arm IP addresses.
#   2. Set rollout.model.model_path and actor.model.model_path to your π₀ checkpoint.
#   3. Adjust cluster.num_nodes and node_groups.node_ranks for your deployment.

defaults:
  - env/yam@env.train
  - env/yam@env.eval
  - model/pi0@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 2
  component_placement:
    actor:
      node_group: "gpu"
      placement: 0-0
    env:
      node_group: yam
      placement: 0
    rollout:
      node_group: "gpu"
      placement: 0-0
  node_groups:
    - label: "gpu"
      node_ranks: 0
    - label: yam
      node_ranks: 1
      hardware:
        type: YAM
        configs:
          - node_rank: 1
            left_ip: 192.168.1.10   # Replace with left arm IP
            right_ip: 192.168.1.11  # Replace with right arm IP
            # camera_serials: null  # null = auto-detect all connected RealSense cameras
            disable_validate: False

runner:
  task_type: embodied
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: "yam_ppo_openpi"
    logger_backends: ["tensorboard"]  # or wandb, swanlab

  max_epochs: 1000
  max_steps: -1

  only_eval: False
  val_check_interval: -1
  save_interval: 40

  resume_dir: null
  ckpt_path: null

algorithm:
  normalize_advantages: True
  kl_penalty: kl
  group_size: 1
  reward_coef: 1.0

  rollout_epoch: 4
  eval_rollout_epoch: 1

  reward_type: chunk_level
  logprob_type: chunk_level
  entropy_type: token_level

  update_epoch: 4
  adv_type: gae
  loss_type: actor_critic
  loss_agg_func: "token-mean"
  kl_beta: 0.0
  entropy_bonus: 0
  clip_ratio_high: 0.2
  clip_ratio_low: 0.2
  clip_ratio_c: 3.0
  value_clip: 0.2
  huber_delta: 10.0

  gamma: 0.99
  gae_lambda: 0.95

  filter_rewards: False
  rewards_lower_bound: 0.1
  rewards_upper_bound: 0.9

  sampling_params:
    do_sample: True
    temperature_train: 1.0
    temperature_eval: 0.6
    top_k: 50
    top_p: 1.0
    repetition_penalty: 1.0
    add_BOS: False

  length_params:
    max_new_token: null
    max_length: 1024
    min_length: 1

env:
  group_name: "EnvGroup"

  train:
    total_num_envs: 1
    max_episode_steps: 100
    max_steps_per_rollout_epoch: 100
    control_rate_hz: 10.0
    task_description: "pick and place"  # Human-readable description for VLA conditioning

  eval:
    total_num_envs: 1
    max_episode_steps: 100
    max_steps_per_rollout_epoch: 100
    control_rate_hz: 10.0
    task_description: "pick and place"

rollout:
  group_name: "RolloutGroup"
  backend: "huggingface"
  enable_offload: False
  pipeline_stage_num: 1

  collect_transitions: True
  collect_prev_infos: False

  model:
    model_path: "/path/to/pi0_checkpoint"
    precision: ${actor.model.precision}

  enable_torch_compile: True
  enable_cuda_graph: False

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"

  micro_batch_size: 16
  global_batch_size: 16
  seed: 1234
  enable_offload: False

  model:
    model_path: "/path/to/pi0_checkpoint"

  optim:
    clip_grad: 10.0
    lr: 1e-5
    lr_scheduler: torch_constant

  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "no_shard"
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

reward:
  use_reward_model: False

critic:
  use_critic_model: False
