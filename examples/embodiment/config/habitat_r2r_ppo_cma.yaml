defaults:
  - env/habitat_r2r@env.train
  - env/habitat_r2r@env.eval
  - model/cma@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 1
  component_placement:
    actor,env,rollout: 4-7

runner:
  task_type: embodied
  logger:
    log_path: "logs"
    project_name: rlinf
    experiment_name: "habitat_r2r_ppo_cma"
    logger_backends: ["tensorboard"] # wandb, swanlab

  max_epochs: 1000
  max_steps: -1

  only_eval: False
  eval_policy_path: null # Optional: .pt file or None, if None, will use the checkpoint in rollout.model.model_path
  val_check_interval: -1
  save_interval: 10

  resume_dir: null # Optional: path to a saved checkpoint directory, such as 'checkpoints/global_step_10'. If not None, it will be used to resume training.
  ckpt_path: null  # Optional: path to a .pt checkpoint. If not None, it will be loaded after the model is instantiated (for evaluation).

algorithm:
  normalize_advantages: True
  kl_penalty: kl  # how to estimate kl divergence: kl or kl_penalty
  
  rollout_epoch: 1 # number of rollout epochs per rollout step
  eval_rollout_epoch: 1 # set eval_rollout_epoch > 0 when enable runner.only_eval or runner.val_check_interval > 0
  group_size: 1  # number of groups per rollout step
  update_epoch: 1

  reward_type: chunk_level  # action_level or chunk_level
  logprob_type: action_level
  entropy_type: action_level

  adv_type: gae
  loss_type: actor_critic
  loss_agg_func: "token-mean"
  kl_beta: 0.0
  entropy_bonus: 0.005

  clip_ratio_high: 0.2
  clip_ratio_low: 0.2
  clip_ratio_c: 3.0
  value_clip: 1.0
  huber_delta: 10.0

  gamma: 0.99
  gae_lambda: 0.95

  reward_coef: 1.0

  sampling_params:
    do_sample: True
    temperature_train: 1.0
    temperature_eval: 0.6
    top_k: 0
    top_p: 1.0
    repetition_penalty: 1.0

  # length argument for autoregressive sampling
  # max length means max amount of tokens to generate
  length_params:
    max_new_token: 1
    max_length: 1
    min_length: 1

  filter_rewards: False
  rewards_lower_bound: 0.0
  rewards_upper_bound: 1.0

env:
  group_name: "EnvGroup"
  enable_offload: False
  
  # Override the default values in env/habitat_r2r
  train:
    total_num_envs: 256  # Total number of parallel environments for training
    max_steps_per_rollout_epoch: 160
    max_episode_steps: 160 # max episode steps for truncation

    use_rel_reward: True
    reward_coef: ${algorithm.reward_coef}
    is_eval: False
    
    video_cfg:
      fps: 5
      save_video: True
      video_base_dir: ${runner.logger.log_path}/video/train
    metrics_cfg:
      metrics_base_dir: ${runner.logger.log_path}/metrics/train

  eval:
    total_num_envs: 608 # 608
    max_episode_steps: 120
    max_steps_per_rollout_epoch: 360
    group_size: 1
    auto_reset: True
    ignore_terminations: True
    use_fixed_reset_state_ids: True
    use_ordered_reset_state_ids: True
    reset_gripper_open: False
    is_eval: True
    video_cfg:
      fps: 5
      save_video: True
      video_base_dir: ${runner.logger.log_path}/video/eval
    metrics_cfg:
      metrics_base_dir: ${runner.logger.log_path}/metrics/eval

rollout:
  group_name: "RolloutGroup"
  generation_backend: "huggingface"
  enable_offload: True
  pipeline_stage_num: 1

  model:
    model_path: "/data/vln-dependency/VLN-CE/models/cma_weights/ckpt/best_ckpt_r2r.pth"
    instruction_encoder_config:
      embedding_file: "/data/vln-dependency/VLN-CE/models/cma_weights/instruction_encoder_embedding/embeddings.json.gz"
    depth_encoder_config:
      ddppo_checkpoint: "/data/vln-dependency/VLN-CE/models/cma_weights/ddppo-models/gibson-2plus-resnet50.pth"
    precision: ${actor.model.precision}

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 128
  global_batch_size: 512
  seed: 1234
  enable_offload: True

  # Override only the paths that need to be customized
  # All other CMA configs are inherited from model/cma.yaml
  model:
    model_path: "/data/vln-dependency/VLN-CE/models/cma_weights/ckpt/best_ckpt_r2r.pth"
    instruction_encoder_config:
      embedding_file: "/data/vln-dependency/VLN-CE/models/cma_weights/instruction_encoder_embedding/embeddings.json.gz"
    depth_encoder_config:
      ddppo_checkpoint: "/data/vln-dependency/VLN-CE/models/cma_weights/ddppo-models/gibson-2plus-resnet50.pth"
    precision: "fp32"

  optim:
    lr: 1.0e-4
    value_lr: 3.0e-4
    adam_beta1: 0.9
    adam_beta2: 0.999
    adam_eps: 1.0e-08
    weight_decay: 0.01
    clip_grad: 0.5

  fsdp_config:
    strategy: fsdp
    sharding_strategy: no_shard
    gradient_checkpointing: false
    cpu_offload: false
    offload_pin_memory: false
    reshard_after_forward: true
    enable_gradient_accumulation: true
    forward_prefetch: false
    limit_all_gathers: false
    backward_prefetch: null
    use_orig_params: false
    use_liger_kernel: false
    fsdp_size: -1

    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

    amp:
      enabled: false
      precision: bf16
      use_grad_scaler: false

reward:
  use_reward_model: False

critic:
  use_critic_model: False
