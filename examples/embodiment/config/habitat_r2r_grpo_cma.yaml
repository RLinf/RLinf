defaults:
  - env/habitat_r2r@env.train
  - env/habitat_r2r@env.eval
  - model/cma@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 1
  component_placement:
    actor,env,rollout: 0-7

runner:
  task_type: embodied
  logger:
    log_path: "logs"
    project_name: rlinf
    experiment_name: "habitat_r2r_grpo_cma"
    logger_backends: ["tensorboard"] # wandb, swanlab

  max_epochs: 500
  max_steps: -1

  only_eval: False
  eval_policy_path: null # Optional: .pt file or None, if None, will use the checkpoint in rollout.model.model_path
  val_check_interval: -1
  save_interval: 10

  resume_dir: null

algorithm:
  update_epoch: 2
  normalize_advantages: True
  kl_penalty: kl  # how to estimate kl divergence: kl or kl_penalty
  
  rollout_epoch: 2 # number of rollout epochs per rollout step
  eval_rollout_epoch: 1 # set eval_rollout_epoch > 0 when enable runner.only_eval or runner.val_check_interval > 0
  group_size: 16  # number of groups per rollout step
  
  reward_type: action_level  # action_level or chunk_level
  logprob_type: token_level
  entropy_type: token_level

  adv_type: grpo
  loss_type: actor
  loss_agg_func: "token-mean"
  kl_beta: 0.0
  entropy_bonus: 0
  clip_ratio_high: 0.28
  clip_ratio_low: 0.2
  clip_ratio_c: 3.0
  value_clip: 0.2
  huber_delta: 10.0

  gamma: 0.99
  gae_lambda: 0.95

  reward_coef: 10.0
  filter_rewards: True
  rewards_lower_bound: 1.0
  rewards_upper_bound: 9.0

  sampling_params:
    do_sample: True
    temperature_train: 1.0
    temperature_eval: 0.2
    top_k: -1
    top_p: 1.0
    repetition_penalty: 1.0

  # length argument for autoregressive sampling
  # max length means max amount of tokens to generate
  length_params:
    max_new_token: null
    max_length: 1024
    min_length: 1

env:
  group_name: "EnvGroup"
  enable_offload: False
  data_path_dir: "VLN-CE/datasets/r2r"
  scenes_dir: "VLN-CE/scene_dataset"
  # Override the default values in env/habitat_r2r
  train:
    total_num_envs: 256  # 256 8H20
    max_steps_per_rollout_epoch: 120
    max_episode_steps: 120 # max episode steps for truncation
    group_size: 16
    reward_coef: ${algorithm.reward_coef}
    model_type: ${actor.model.model_type}
    split: train
    data_path: ${env.data_path_dir}/${env.train.split}/${env.train.split}.json.gz
    gt_data_path: ${env.data_path_dir}/${env.train.split}/${env.train.split}_gt.json.gz
    scenes_dir: ${env.scenes_dir}
    video_cfg:
      fps: 5
      save_video: False # Save video will dramasticlly slow down the training
      async_save: False # Habitat needs False for sync save
      video_base_dir: ${runner.logger.log_path}/video/train
    metrics_cfg:
      save_metrics: True
      metrics_base_dir: ${runner.logger.log_path}/metrics/train
  eval:
    total_num_envs: 608 # 608 8H20
    max_episode_steps: 120
    max_steps_per_rollout_epoch: 360
    group_size: 1
    auto_reset: True
    ignore_terminations: True
    reward_coef: ${algorithm.reward_coef}
    model_type: ${actor.model.model_type}
    split: val_unseen
    data_path: ${env.data_path_dir}/${env.eval.split}/${env.eval.split}.json.gz
    gt_data_path: ${env.data_path_dir}/${env.eval.split}/${env.eval.split}_gt.json.gz
    scenes_dir: ${env.scenes_dir}
    video_cfg:
      fps: 5
      save_video: False # Save video will dramasticlly slow down the evaluation
      async_save: False # Habitat needs False for sync save
      video_base_dir: ${runner.logger.log_path}/video/eval
    metrics_cfg:
      save_metrics: True
      metrics_base_dir: ${runner.logger.log_path}/metrics/eval

rollout:
  group_name: "RolloutGroup"
  generation_backend: "huggingface"
  enable_offload: True
  pipeline_stage_num: 1

  model:
    model_path: "VLN-CE/models/cma_weights/ckpt/best_ckpt_r2r.pth"
    instruction_encoder_config:
      embedding_file: "VLN-CE/models/cma_weights/instruction_encoder_embedding/embeddings.json.gz"
    depth_encoder_config:
      ddppo_checkpoint: "VLN-CE/models/cma_weights/ddppo-models/gibson-2plus-resnet50.pth"
    precision: ${actor.model.precision}

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 128
  global_batch_size: 1024
  seed: 1234
  enable_offload: True

  # Override only the paths that need to be customized
  # All other CMA configs are inherited from model/cma.yaml
  model:
    model_path: "VLN-CE/models/cma_weights/ckpt/best_ckpt_r2r.pth"
    use_gt_prefix: True
    gt_prefix_schedule_type: "log"
    gt_prefix_schedule_alpha: 1.0
    gt_prefix_warmup_steps_ratio: 0.2
    gt_prefix_length_ratio: 0.8
    instruction_encoder_config:
      embedding_file: "VLN-CE/models/cma_weights/instruction_encoder_embedding/embeddings.json.gz"
    depth_encoder_config:
      ddppo_checkpoint: "VLN-CE/models/cma_weights/ddppo-models/gibson-2plus-resnet50.pth"

  optim:
    lr: 1.0e-5
    value_lr: 3.0e-3
    adam_beta1: 0.9
    adam_beta2: 0.999
    adam_eps: 1.0e-05
    weight_decay: 0.01
    clip_grad: 1.0

  # Override the default values in training_backend/fsdp
  fsdp_config:
    strategy: "fsdp"
    gradient_checkpointing: False
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

reward:
  use_reward_model: False

critic:
  use_critic_model: False
