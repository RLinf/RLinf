# SAC training with SpaceMouse human-in-the-loop for GenieSim place-workpiece.
#
# Same as geniesim_sac.yaml but with SpaceMouse intervention enabled
# on env_0.  The human operator can take over env_0 at any time using the
# SpaceMouse; the remaining 7 envs are driven entirely by the policy.
#
# Intervened steps are:
#   1. stored in the replay buffer with the actual (human) action
#   2. extracted into the demo buffer for RLPD symmetric sampling
#   3. used for BC regularisation (bc_coef)
#
# Quick-start:
#   cd RLinf
#   GENIESIM_ROOT=.. \
#   python examples/embodiment/train_embodied_agent.py \
#       --config-path examples/embodiment/config \
#       --config-name geniesim_sac_spacemouse

defaults:
  - env/geniesim_place_workpiece@env.train
  - env/geniesim_place_workpiece@env.eval
  - model/cnn_policy@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - override hydra/job_logging: stdout
  - _self_

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 1
  component_placement:
    actor,env,rollout: 0

runner:
  task_type: embodied
  logger:
    log_path: "results"
    project_name: rlinf
    experiment_name: "geniesim_sac_cnn_spacemouse"
    logger_backends: ["tensorboard"]

  max_epochs: 5000
  max_steps: -1

  only_eval: false
  val_check_interval: -1
  save_interval: 200

  resume_dir: null
  ckpt_path: null

algorithm:
  adv_type: embodied_sac
  loss_type: embodied_sac
  loss_agg_func: "token-mean"

  update_epoch: 8
  critic_actor_ratio: 2
  group_size: 1
  rollout_epoch: 1
  eval_rollout_epoch: 1

  agg_q: min
  actor_agg_q: mean
  backup_entropy: false
  bootstrap_type: standard
  gamma: 0.96
  tau: 0.005

  target_entropy: -3
  entropy_tuning:
    alpha_type: softplus
    initial_alpha: 0.01
    optim:
      lr: 3.0e-4
      lr_scheduler: torch_constant
      clip_grad: 1.0

  replay_buffer:
    enable_cache: true
    cache_size: 200
    sample_window_size: 200
    min_buffer_size: 2
    auto_save: false

  demo_buffer:
    enable_cache: true
    cache_size: 80
    sample_window_size: 100
    min_buffer_size: 1
    auto_save: false
    # Set to the demo buffer directory produced by convert_demos_to_buffer.py.
    # Leave null to skip pre-loading (buffer will be populated online via SpaceMouse).
    load_path: null

  target_update_freq: 1
  target_update_type: all
  bc_coef: 3.0

  traj_dump:
    enabled: true
    interval: 10
    include_images: false

  sampling_params:
    do_sample: true
    temperature_train: 1.0
    temperature_eval: 0.6
    top_k: 50
    top_p: 1.0
    repetition_penalty: 1.0

  length_params:
    max_new_token: 7
    max_length: 1024
    min_length: 1

env:
  group_name: "EnvGroup"

  train:
    total_num_envs: 10
    group_size: 1
    max_steps_per_rollout_epoch: 100
    max_episode_steps: 300
    auto_reset: true
    ignore_terminations: false
    use_rel_reward: false
    reward_coef: 1.0
    is_eval: false
    use_spacemouse: true
    spacemouse_cfg:
      action_scale: 0.01
      rotation_scale: 0.05
      intervention_env_id: 0
      button_mode: training
    video_cfg:
      save_video: false
      video_base_dir: ${runner.logger.log_path}/video/train

  eval:
    total_num_envs: 4
    group_size: 1
    max_steps_per_rollout_epoch: 100
    max_episode_steps: 300
    auto_reset: true
    ignore_terminations: false
    use_rel_reward: false
    reward_coef: 1.0
    is_eval: true
    video_cfg:
      save_video: true
      video_base_dir: ${runner.logger.log_path}/video/eval

rollout:
  group_name: "RolloutGroup"
  backend: "huggingface"
  enable_offload: false
  pipeline_stage_num: 1
  collect_transitions: true
  collect_prev_infos: false

  model:
    model_path: "/path/to/model" # https://huggingface.co/RLinf/RLinf-ResNet10-pretrained
    precision: ${actor.model.precision}

  enable_torch_compile: false
  enable_cuda_graph: false

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"

  micro_batch_size: 128
  global_batch_size: 128
  seed: 1234
  enable_offload: false
  enable_drq: true

  model:
    model_type: cnn_policy
    model_path: "/path/to/model" # https://huggingface.co/RLinf/RLinf-ResNet10-pretrained
    policy_setup: "g2-ee"
    image_size: [3, 128, 128]
    image_num: 1
    state_dim: 12
    action_dim: 7
    num_action_chunks: 1
    hidden_dim: 256
    precision: "32"
    add_value_head: false
    add_q_head: true
    q_head_type: default
    num_q_heads: 10
    backbone: resnet
    is_lora: false
    lora_rank: 32
    encoder_config:
      ckpt_name: "resnet10_pretrained.pt"

  optim:
    clip_grad: 5.0
    lr: 3.0e-4
    lr_scheduler: torch_constant

  critic_optim:
    clip_grad: 5.0
    lr: 3.0e-4
    lr_scheduler: torch_constant

  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "no_shard"
    use_orig_params: true
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}
    gradient_checkpointing: false
    cpu_offload: false
    offload_pin_memory: false
    reshard_after_forward: true
    enable_gradient_accumulation: true
    forward_prefetch: false
    limit_all_gathers: false
    backward_prefetch: null
    use_liger_kernel: false
    fsdp_size: -1
    amp_autocast:
      enabled: false
      precision: "bf16"
    grad_scaler:
      enabled: false

reward:
  use_reward_model: false

critic:
  use_critic_model: false
