defaults:
  - env/libero_spatial@env.train
  - env/libero_spatial@env.eval
  - model/dreamzero@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - weight_syncer/patch_syncer@weight_syncer
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 1
  component_placement:
    actor: 0-3
    env: 0-3
    rollout: 4-7


runner:
  task_type: embodied
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: "libero_spatial_dagger_dreamzero"
    logger_backends: ["tensorboard"]

  max_epochs: 1000
  max_steps: -1

  only_eval: False
  val_check_interval: 8
  save_interval: -1

  resume_dir: null
  ckpt_path: null

algorithm:
  # dagger specific args
  dagger:
    # beta scheduling args. Expert acts with the probability of beta, while student acts with 1 - beta
    init_beta: 1.0
    beta_schedule: "exponential" # beta_t = beta_{t-1} * beta_decay
    beta_decay: 0.99
    # only_save_expert controls dagger logic. 
    # If set False, all data will be re-labeled by expert and saved (classic-dagger)
    # If set True, only expert data will be saved (hg-dagger, always used in real-world exp)
    only_save_expert: False

  rollout_epoch: 1
  eval_rollout_epoch: 1
  gamma: 0.99

  update_epoch: 1
  adv_type: gae
  loss_type: embodied_dagger

  sampling_params:
    do_sample: True
    temperature_train: 1.0
    temperature_eval: 0.6
    top_k: 50
    top_p: 1.0
    repetition_penalty: 1.0
    add_BOS: False

  length_params:
    max_new_token: null
    max_length: 1024
    min_length: 1

  replay_buffer:
    enable_cache: True
    cache_size: 2000
    min_buffer_size: 4
    sample_window_size: 2000
    auto_save: False

env:
  group_name: "EnvGroup"

  train:
    auto_reset: True
    ignore_terminations: True
    total_num_envs: 4
    max_episode_steps: 240
    max_steps_per_rollout_epoch: 240
  eval:
    total_num_envs: 4
    auto_reset: True
    ignore_terminations: True
    max_episode_steps: 240
    max_steps_per_rollout_epoch: 240
    group_size: 1
    is_eval: True
    video_cfg:
      save_video: False
      video_base_dir: ${runner.logger.log_path}/video/eval

rollout:
  group_name: "RolloutGroup"
  backend: "huggingface"
  recompute_logprobs: False
  enable_offload: False
  pipeline_stage_num: 1
  collect_prev_infos: False

  model:
    model_path: /mnt/project_rlinf_hs/lyh/data/model/dz-libero
    precision: ${actor.model.precision}

  expert_model: # define expert model_path here
    model_path: /mnt/project_rlinf/shiletong/RLinf_fix_lint/RLinf_gz_fork/RLinf-DreamZero-WAN2.2-SFT-LIBERO-Step21000
    precision: ${actor.model.precision}

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 1
  global_batch_size: 16
  seed: 1234
  enable_offload: False

  model:
    model_path: /mnt/project_rlinf_hs/lyh/data/model/dz-libero
    num_action_chunks: 16
    tokenizer_path: /mnt/project_rlinf/liyanghao/data/models/umt5-xxl
    action_dim: 7
    max_seq_len: 512
    precision: bf16
    model_type: "dreamzero"
    embodiment_tag: "libero_sim"
    is_lora: False

  optim:
    lr: 1e-5
    value_lr: 1.0e-4
    adam_beta1: 0.9
    adam_beta2: 0.95
    adam_eps: 1.0e-08
    weight_decay: 1e-10
    clip_grad: 5.0
    warmup_style: "cosine"
    lr_warmup_steps: 20
    total_training_steps: 8000

  fsdp_config:
    strategy: "fsdp2"
    sharding_strategy: "full_shard"
    gradient_checkpointing: False
    use_orig_params: True
    cpu_offload: False
    limit_all_gathers: True
    offload_pin_memory: False
    grad_scaler:
      enabled: False
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}
    amp_autocast:
      enabled: false
      precision: "bf16"

reward:
  use_reward_model: False

critic:
  use_critic_model: False