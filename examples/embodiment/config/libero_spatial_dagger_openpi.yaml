defaults:
  - env/libero_spatial@env.train
  - env/libero_spatial@env.eval
  - model/pi0@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 1
  component_placement:
    actor: 0-3
    env,rollout: 4-7

runner:
  task_type: embodied
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: "libero_spatial_dagger_openpi"
    logger_backends: ["tensorboard"] # wandb, swanlab

  max_epochs: 8000
  max_steps: -1

  only_eval: False
  val_check_interval: 8
  save_interval: -1

  resume_dir: null # Optional: path to a saved checkpoint directory, such as 'checkpoints/global_step_10'. If not None, it will be used to resume training.
  ckpt_path: null  # Optional: path to a .pt checkpoint. If not None, it will be loaded after the model is instantiated (for evaluation).

algorithm:
  dagger:
    only_save_expert: False  # If False, use classical DAgger: beta decides who acts, expert labels every step
    init_beta: 1
    beta_schedule: "exponential"
    beta_decay: 0.99

  rollout_epoch: 1
  eval_rollout_epoch: 1

  gamma: 0.99

  update_epoch: 1
  adv_type: gae
  loss_type: embodied_dagger

  # params for generation
  sampling_params:
    do_sample: True
    temperature_train: 1.0
    temperature_eval: 0.6
    top_k: 50
    top_p: 1.0
    repetition_penalty: 1.0
    add_BOS: False


  # length argument for autoregressive sampling
  # max length means max amount of tokens to generate
  length_params:
    max_new_token: 7
    max_length: 1024
    min_length: 1
  
  replay_buffer:
    enable_cache: True
    cache_size: 2000 # number of trajectories cached in memory
    min_buffer_size: 16  # Minimum buffer size before training starts (in number of trajectories). If set too large, it will take a long time to start real-world training 
    sample_window_size: 2000 # number of latest trajectories to sample from for replay buffer
    auto_save: False

env:
  group_name: "EnvGroup"

  # Override the default values in env/libero_spatial
  train:
    auto_reset: True
    ignore_terminations: True
    total_num_envs: 64
    max_episode_steps: 240 # max episode steps for truncation
    max_steps_per_rollout_epoch: 240
  eval:
    total_num_envs: 64
    auto_reset: True
    ignore_terminations: True
    max_episode_steps: 240
    max_steps_per_rollout_epoch: 240
    group_size: 1
    is_eval: True
    video_cfg:
      save_video: True
      video_base_dir: ${runner.logger.log_path}/video/eval

rollout:
  group_name: "RolloutGroup"
  generation_backend: "huggingface"
  recompute_logprobs: False
  unnorm_key: libero_10
  enable_offload: False
  pipeline_stage_num: 1
  collect_prev_infos: False

  model:
    model_path: "/path/to/model"
    precision: ${actor.model.precision}

  expert_model:
    model_path: "/path/to/expert_model"
    precision: ${actor.model.precision}

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 32
  global_batch_size: 256 # maximum : global batch size = micro batch size * actor num_processes.
  seed: 1234
  enable_offload: False

  # Override the default values in model/pi0
  model:
    precision: null
    model_path: "/path/to/model"
    num_action_chunks: 10 # interface for the env
    add_value_head: False
    # openpi specific parameters
    openpi:
      config_name: "pi0_libero"
      train_expert_only: False
      detach_critic_input: True
      action_chunk: ${actor.model.num_action_chunks}

  optim:
    lr: 1e-5
    value_lr: 1.0e-4
    adam_beta1: 0.9
    adam_beta2: 0.95
    adam_eps: 1.0e-08
    weight_decay: 1e-10
    clip_grad: 5.0
    warmup_style: "cosine"
    lr_warmup_steps: 20
    total_training_steps: 8000

  # Override the default values in training_backend/fsdp
  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "no_shard"
    gradient_checkpointing: False # for openpi, gradient checkpointing is not supported, please do not change this value
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

reward:
  use_reward_model: False

critic:
  use_critic_model: False
