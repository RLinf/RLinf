# SO101 arm offline SFT (behavior cloning) training config.
# Trains a CNN policy from collected LeRobot-format demonstration data.
#
# Usage:
#   python examples/embodiment/train_embodied_agent.py \
#       --config-name realworld_so101_sft \
#       algorithm.demo_buffer.dataset_path=/path/to/collected_data

defaults:
  - env/realworld_so101@env.train
  - env/realworld_so101@env.eval
  - model/cnn_policy@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - weight_syncer/patch_syncer@weight_syncer
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 1
  component_placement:
    actor: 0-0
    env: 0-0
    rollout: 0-0

runner:
  task_type: embodied
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: "so101-sft"
    logger_backends: ["tensorboard"]

  max_epochs: 50
  max_steps: -1

  only_eval: False
  val_check_interval: 5
  save_interval: 5

  resume_dir: null
  ckpt_path: null

algorithm:
  update_epoch: 1
  group_size: 1

  rollout_epoch: 1
  eval_rollout_epoch: 1

  adv_type: embodied_sft
  loss_type: embodied_sft
  loss_agg_func: "token-mean"

  logprob_type: token_level
  reward_type: step_level
  normalize_advantages: False
  entropy_bonus: 0.0

  clip_ratio_low: 0.8
  clip_ratio_high: 1.2

  replay_buffer:
    enable_cache: False
    cache_size: 1000
    sample_window_size: 1000
    auto_save: False
    min_buffer_size: 0

  # Demo buffer for SFT — loaded from LeRobot-format dataset
  # produced by CollectEpisode / LeRobotDatasetWriter.
  demo_buffer:
    dataset_path: /path/to/collected_data
    enable_cache: False
    cache_size: 100000
    sample_window_size: 100000
    auto_save: False
    min_buffer_size: 1

env:
  group_name: "EnvGroup"

  train:
    total_num_envs: 1
    override_cfg:
      is_dummy: True

  eval:
    total_num_envs: 1
    override_cfg:
      is_dummy: True

rollout:
  group_name: "RolloutGroup"
  backend: "huggingface"
  enable_offload: False
  pipeline_stage_num: 1

  collect_transitions: False
  collect_prev_infos: False

  model:
    model_path: "/path/to/model"
    precision: ${actor.model.precision}

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"

  micro_batch_size: 64
  global_batch_size: 64
  seed: 1234
  enable_offload: False

  model:
    model_path: "/path/to/model"
    model_type: cnn_policy
    image_size: [3, 128, 128]
    state_dim: 7   # 6 joint positions + 1 gripper
    action_dim: 7  # 6 joint targets + 1 gripper target
    backbone: resnet
    add_value_head: False
    add_q_head: False
    image_num: 1
    independent_std: True
    encoder_config:
      ckpt_name: "resnet10_pretrained.pt"

  optim:
    clip_grad: 10.0
    lr: 1e-4
    lr_scheduler: torch_cosine

  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "no_shard"
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

reward:
  use_reward_model: False

critic:
  use_critic_model: False
