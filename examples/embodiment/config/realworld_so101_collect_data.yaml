# SO101 arm data collection config.
# Uses LeRobot's leader-follower teleoperation to collect demonstration data.
# Prerequisite: assemble both leader and follower SO101 arms (see LeRobot docs).
#
# Usage:
#   python examples/embodiment/train_embodied_agent.py \
#       --config-name realworld_so101_collect_data

defaults:
  - env/realworld_so101@env.eval
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 1
  component_placement:
    env:
      node_group: so101
      placement: 0
  node_groups:
    - label: so101
      node_ranks: 0
      hardware:
        type: SO101
        configs:
          - port: /dev/ttyACM0
            leader_port: /dev/ttyACM1
            node_rank: 0

runner:
  task_type: embodied
  logger:
    log_path: null
    project_name: rlinf
    experiment_name: "so101-collect-data"
    logger_backends: ["tensorboard"]
  num_data_episodes: 20
  record_task_description: False

env:
  group_name: "EnvGroup"
  eval:
    ignore_terminations: False
    auto_reset: False
    use_spacemouse: False
    max_episode_steps: 10000
    override_cfg:
      enable_teleop: True
      success_hold_steps: 1

    data_collection:
      enabled: True
      save_dir: ${runner.logger.log_path}/collected_data
      export_format: "pickle"
      only_success: False
      robot_type: "so101"
      fps: 30
