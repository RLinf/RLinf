defaults:
  - model/pi0@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 1
  component_placement:
    actor,env,rollout: 0-0

runner:
  task_type: sft
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: "so101_sft_openpi"
    logger_backends: ["tensorboard"]

  max_epochs: -1
  max_steps: 2000
  val_check_interval: -1
  save_interval: 100

data:
  # LeRobot dataset path or HF repo id.  The SO101 collection writes one
  # ``run_<timestamp>/`` subdir per session; merge them into a single
  # dataset first with::
  #
  #     python toolkits/lerobot/merge_lerobot_datasets.py \
  #         --source-dir /path/to/so101_data --output-dir /path/to/so101_data_merged
  #
  # Then either pass the merged path directly, or symlink it into
  # ``$HF_LEROBOT_HOME/so101_data`` and set ``train_data_paths: so101_data``
  # so the runtime asset_id matches the pi0_so101 norm_stats lookup path.
  train_data_paths: "so101_data"

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 4
  global_batch_size: 32
  seed: 0

  model:
    precision: null
    model_path: "/path/to/pi0-model"
    num_action_chunks: 10
    action_dim: 6
    add_value_head: False
    openpi:
      config_name: "pi0_so101"
      detach_critic_input: True
      num_images_in_input: 2

  optim:
    lr: 2.5e-5
    adam_beta1: 0.9
    adam_beta2: 0.95
    adam_eps: 1.0e-08
    weight_decay: 1.0e-10
    clip_grad: 1.0
    warmup_style: "cosine"
    lr_warmup_steps: 1000
    total_training_steps: 30000

  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "full_shard"
    use_orig_params: False
    gradient_checkpointing: False
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}
