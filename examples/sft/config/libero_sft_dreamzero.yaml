defaults:
  - training_backend/fsdp@actor.fsdp_config
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 1
  component_placement:
    actor,env,rollout: 0-1

runner:
  task_type: sft
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: "libero_sft_dreamzero_lora_2gpu"
    logger_backends: ["tensorboard", "wandb"]

  max_epochs: 100000
  max_steps: 30000
  val_check_interval: -1
  save_interval: 2000

data:
  train_data_paths: ${oc.env:LIBERO_DATA_PATH,/path/to/libero_10}

algorithm:
  adv_type: gae

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 1
  global_batch_size: 2
  seed: 0
  dataloader_num_workers: 1

  model:
    model_type: "dreamzero"
    precision: bf16
    model_path: ${oc.env:DREAMZERO_MODEL_PATH,/path/to/DreamZero-LIBERO}
    tokenizer_path: "google/umt5-xxl"
    max_seq_len: 512
    dreamzero_action_horizon: 16
    dreamzero_num_chunks: 2
    dreamzero_max_action_dim: 32
    dreamzero_max_state_dim: 64
    add_value_head: false
    is_lora: true
    lora_rank: 4

  optim:
    lr: 1.0e-4
    value_lr: 1.55e-4
    adam_beta1: 0.9
    adam_beta2: 0.95
    adam_eps: 1.0e-08
    weight_decay: 1.0e-5
    clip_grad: 1.0
    lr_scheduler: "cosine"
    lr_warmup_steps: 1000
    total_training_steps: 30000

  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "full_shard"
    use_orig_params: true
    gradient_checkpointing: true
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

reward:
  use_reward_model: false

critic:
  use_critic_model: false
