# Evo-1 (evo1-flash) SFT config for RLinf.
# Native flow-matching MSE fine-tuning on a LIBERO-style LeRobot dataset.
#
# Evo-1 = InternVL3-1B embedder + flow-matching (DiT) action head. SFT reuses
# Evo-1's own LeRobotDataset (from the external repo) via the EVO1 branch in
# FSDPVlaSftWorker.build_dataloader / rlinf/models/embodiment/evo1/sft_builder.py.
#
# Launch: bash examples/sft/run_vla_sft.sh libero_sft_evo1
# Prereq: EVO1_REPO_PATH (or actor.model.evo1.repo_path) -> the Evo-1 repo root;
#         data.train_data_paths -> an Evo-1 dataset config YAML.
#
# For Evo-1's original (DeepSpeed, two-stage) LIBERO training recipe, see the
# Evo-1 repo README "Training on Your Own Dataset": https://github.com/MINT-SJTU/Evo-1

defaults:
  - model/evo1@actor.model
  - hybrid_engines/fsdp@actor.fsdp_config
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 1
  component_placement:
    actor,env,rollout: 0-0

runner:
  task_type: sft
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: "evo1_libero_sft"
    logger_backends: ["tensorboard"] # wandb, swanlab

  max_epochs: -1
  max_steps: 30000
  val_check_interval: -1
  save_interval: 2000

data:
  # Path to an Evo-1 dataset config YAML (the same file Evo-1's own training
  # reads via config.dataset_config_path). It defines data_groups /
  # max_action_dim / max_state_dim / max_views etc. NOT a raw data directory.
  train_data_paths: "/path/to/evo1_libero_dataset_config.yaml"

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 4
  global_batch_size: 128
  seed: 0

  # Override the model/evo1 defaults for this run.
  model:
    precision: "bf16"
    model_path: "/path/to/Evo1_LIBERO"
    num_action_chunks: 14 # interface for the env
    add_value_head: False
    evo1:
      # Evo-1 repo root (or set EVO1_REPO_PATH) -- needed for the dataset loader.
      repo_path: "/path/to/Evo-1"
      # Must match the checkpoint's norm_stats.json keys.
      arm_key: "libero_robot"
      dataset_key: "libero_robot"

  optim:
    lr: 2.5e-5
    adam_beta1: 0.9
    adam_beta2: 0.95
    adam_eps: 1.0e-08
    weight_decay: 1.0e-10
    clip_grad: 1.0
    warmup_style: "cosine"
    lr_warmup_steps: 1000
    total_training_steps: 30000  # for lr scheduler cosine decay

  # Override the default values in hybrid_engines/fsdp
  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "full_shard"
    use_orig_params: False
    gradient_checkpointing: False
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}
