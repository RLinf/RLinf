defaults:
  - model/pi0_5@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - override hydra/job_logging: stdout
  - _self_

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 1
  component_placement:
    actor: 0

runner:
  task_type: sft
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: "sandwich_new_all_pi05_sft"
    logger_backends: ["tensorboard"]

  max_epochs: -1
  max_steps: 20000
  val_check_interval: -1
  save_interval: 5000

data:
  train_data_paths: "/inspire/qb-ilm/project/robot-reasoning/czxs253130583/yushun/RLinf/ocl-data/lerobot-data/sandwich_new_all"

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 1
  global_batch_size: 8
  seed: 0
  openpi_data:
    repo_id: "pi05_sandwich_new_all"

  model:
    precision: null
    model_path: "/inspire/qb-ilm/project/robot-reasoning/czxs253130583/yushun/openpi/checkpoints/torch/pi05_sandwich_new_all_rlinf_base"
    num_action_chunks: 50
    action_dim: 14
    add_value_head: False
    openpi:
      config_name: "pi05_aloha_robotwin"
      detach_critic_input: True
      num_images_in_input: 3
      train_expert_only: True
    openpi_data:
      repo_id: "pi05_sandwich_new_all"

  optim:
    lr: 2.5e-5
    adam_beta1: 0.9
    adam_beta2: 0.95
    adam_eps: 1.0e-08
    weight_decay: 1e-10
    clip_grad: 1.0
    total_training_steps: 20000
    lr_warmup_steps: 1000
    lr_scheduler: "cosine"
    num_cycles: 0.5
    min_lr: 2.5e-6

  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "no_shard"
    use_orig_params: False
    gradient_checkpointing: False
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}
