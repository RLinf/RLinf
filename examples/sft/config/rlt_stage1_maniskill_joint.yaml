defaults:
  - model/rlt_stage1@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 1
  component_placement:
    actor,env,rollout: 0-0

runner:
  task_type: sft
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: "rlt_stage1_maniskill_joint"
    logger_backends: ["wandb"]

  max_epochs: -1
  max_steps: 5000
  val_check_interval: -1
  save_interval: 1000

data:
  train_data_paths:
    - dataset_path: "/mnt/public2/xiekaizhi/rlt-openpi-sim/rlt_maniskill_joint"
      weight: 1.0

algorithm:
  adv_type: gae

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 8
  global_batch_size: 64
  seed: 0

  model:
    precision: null
    model_path: "/mnt/public2/xiekaizhi/rlt-openpi-sim/RLinf/logs/20260530-22:57:46/rlt_maniskill_joint_pi05_sft/checkpoints/global_step_2000/actor"
    num_action_chunks: 10
    action_dim: 8
    rlt_stage1:
      config_name: "pi05_rlt_joint"
      norm_stats_path: ${actor.openpi_data.norm_stats_path}
      num_images_in_input: 2
      num_steps: 5
      embedding_dim: 2048
      encoder_layers: 2
      encoder_heads: 8
      decoder_layers: 2
      decoder_heads: 8
      vla_finetune_alpha: 0.0
      gradient_checkpointing: True

  openpi_data:
    repo_id: "/mnt/public2/xiekaizhi/rlt-openpi-sim/rlt_maniskill_joint"
    norm_stats_path: "/mnt/public2/xiekaizhi/rlt-openpi-sim/rlt_maniskill_joint/norm_stats.json"
    default_prompt: "insert the peg in the hole"

  optim:
    lr: 1.0e-4
    value_lr: 1.0e-4
    adam_beta1: 0.9
    adam_beta2: 0.95
    adam_eps: 1.0e-08
    weight_decay: 1.0e-5
    clip_grad: 1.0
    total_training_steps: 5000
    lr_warmup_steps: 500
    lr_scheduler: "cosine"
    num_cycles: 0.5
    min_lr: 1.0e-5

  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "no_shard"
    use_orig_params: False
    gradient_checkpointing: False
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

reward:
  use_reward_model: False

critic:
  use_critic_model: False
