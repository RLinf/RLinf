defaults:
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null

cluster:
  num_nodes: 2
  component_placement:
    server:
      node_group: rollout_gpu
      placement: all
  node_groups:
    - label: rollout_gpu
      node_ranks: 1
    - label: test
      node_ranks: 0

router_server_args:
  model_path: /mnt/public/hf_models/qwen2.5-VL-3B/
  tensor_parallel_size: 1
  pipeline_parallel_size: 1

  return_logprobs: False
  validate_weight: False
  validate_save_dir: null
  rollout_backend: sglang

  group_name: SGLangServerGroup
  launch_server: True
  server:
    model_path: ${..model_path}
    tp_size: ${..tensor_parallel_size}
    pp_size: ${..pipeline_parallel_size}
    mem_fraction_static: 0.85
    max_running_requests: 64
    cuda_graph_max_bs: 64
    disable_cuda_graph: False
    enable_memory_saver: True
    enable_torch_compile: False
    torch_compile_max_bs: 64
    dtype: bfloat16
    skip_tokenizer_init: False
    decode_log_interval: 500000
    attention_backend: triton
    log_level: warning
    tool_call_parser: null

  router_group_name: SGLangRouterGroup
  launch_router: True
  router:
    policy: cache_aware
    log_level: warn
    worker_startup_timeout_secs: 1800
    request_timeout_secs: 1800

demo_max_new_tokens: 32
