defaults:
  - env/behavior_r1pro@env.eval
  - model/pi0_5_pytorch@rollout.model
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 1
  component_placement:
    rollout,env: all

runner:
  task_type: embodied_eval
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: "behavior_openpi05_pytorch_eval"
    logger_backends: ["tensorboard"]

  only_eval: True

  max_epochs: 1000
  max_steps: 1

  val_check_interval: -1
  save_interval: -1

  resume_dir: null
  ckpt_path: null

env:
  group_name: "EnvGroup"

  eval:
    rollout_epoch: 2
    total_num_envs: 8
    max_episode_steps: 4096
    max_steps_per_rollout_epoch: 4096
    video_cfg:
      save_video: True
      video_base_dir: ${runner.logger.log_path}/video/eval
      fps: 15

rollout:
  group_name: "RolloutGroup"
  backend: "huggingface"
  enable_offload: True
  pipeline_stage_num: 1

  sampling_params:
    do_sample: True
    temperature_train: 1.0
    temperature_eval: 0.6
    top_k: 50
    top_p: 1.0
    repetition_penalty: 1.0
    max_new_tokens: null

  model:
    # NEW-format checkpoint produced by ckpt_convertor.openpi (old2new / sft2new).
    # Set this to your local new-format eval checkpoint directory.
    model_path: /path/to/pi05_sft_pytorch_new
    add_value_head: False
    openpi:
      # Canonical BEHAVIOR norm stats — the SAME assets the SFT path resolves, so
      # eval and SFT share one norm-stats distribution. Norm stats live at
      # {assets_dir}/{asset_id}/norm_stats.json.
      assets_dir: /path/to/pi05_sft_pytorch_new
      asset_id: physical-intelligence/behavior
      # PaliGemma SentencePiece tokenizer model (resolved from YAML, not hardcoded
      # in code).
      paligemma_tokenizer: /path/to/paligemma_tokenizer/paligemma_tokenizer.model
