name: SFT End-to-End Tests

on:
  workflow_call:

jobs:
  sft-dreamzero-droid-wan22-test:
    runs-on: embodied
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Create dreamzero sft environment
        run: |
          unset UV_DEFAULT_INDEX
          export UV_PATH=/workspace/dataset/.uv
          export UV_LINK_MODE=symlink
          export UV_CACHE_DIR=/workspace/dataset/.uv_cache
          export UV_PYTHON_INSTALL_DIR=/workspace/dataset/.uv_python
          bash requirements/install.sh embodied --model dreamzero

      - name: DreamZero DROID WAN22 SFT test
        timeout-minutes: 30
        run: |
          unset PYTHONPATH
          export REPO_PATH=$(pwd)
          export DREAMZERO_PATH=/workspace/dataset/DreamZero/dreamzero
          source .venv/bin/activate
          bash tests/e2e_tests/sft/run_vla_sft.sh droid_sft_wan22

      - name: Clean up
        run: |
          rm -rf .venv
          uv cache prune

  sft-fastwam-libero-test:
    runs-on: embodied
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Create FastWAM SFT environment
        run: |
          unset UV_DEFAULT_INDEX
          export UV_PATH=/workspace/dataset/.uv
          export UV_LINK_MODE=symlink
          export UV_CACHE_DIR=/workspace/dataset/.uv_cache
          export UV_PYTHON_INSTALL_DIR=/workspace/dataset/.uv_python
          bash requirements/install.sh embodied --model fastwam

      - name: FastWAM LIBERO FSDP SFT test
        timeout-minutes: 60
        run: |
          unset PYTHONPATH
          export REPO_PATH=$(pwd)
          export DIFFSYNTH_MODEL_BASE_PATH=/workspace/dataset/FastWAM/models
          test -f /workspace/dataset/FastWAM/checkpoints/libero_uncond_2cam224.pt
          test -f /workspace/dataset/FastWAM/checkpoints/libero_uncond_2cam224_dataset_stats.json
          test -d /workspace/dataset/FastWAM/models/Wan-AI/Wan2.2-TI2V-5B
          test -d /workspace/dataset/FastWAM/models/Wan-AI/Wan2.1-T2V-1.3B
          test -d /workspace/dataset/FastWAM/text_embeds_cache/libero
          test -d /workspace/dataset/data/sft-ci-data/fastwam-libero
          source .venv/bin/activate
          bash tests/e2e_tests/sft/run_vla_sft.sh libero_sft_fastwam

      - name: Clean up
        if: always()
        run: |
          ray stop || true
          rm -rf .venv
          uv cache prune

  sft-maniskill-openpi-test:
    runs-on: embodied
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Create sft environment
        run: |
          unset UV_DEFAULT_INDEX
          export UV_PATH=/workspace/dataset/.uv
          export UV_LINK_MODE=symlink
          export UV_CACHE_DIR=/workspace/dataset/.uv_cache
          export UV_PYTHON_INSTALL_DIR=/workspace/dataset/.uv_python
          export LIBERO_PATH=/workspace/dataset/LIBERO
          bash requirements/install.sh embodied --model openpi --env maniskill_libero

      - name: SFT ManiSkill OpenPI test
        timeout-minutes: 20
        run: |
          unset PYTHONPATH
          export REPO_PATH=$(pwd)
          source .venv/bin/activate
          bash tests/e2e_tests/sft/run_vla_sft.sh maniskill_sft_openpi

      - name: SFT ManiSkill RLT Stage1 OpenPI Pi05 test
        timeout-minutes: 20
        run: |
          unset PYTHONPATH
          export REPO_PATH=$(pwd)
          source .venv/bin/activate
          bash tests/e2e_tests/sft/run_vla_sft.sh maniskill_rlt_stage1_sft_openpi_pi05

      - name: Clean up
        run: |
          rm -rf .venv
          uv cache prune

  sft-robo2vlm-test:
    runs-on: reason
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Create vlm sft environment
        run: |
          unset UV_DEFAULT_INDEX
          export UV_PATH=/workspace/dataset/.uv
          export UV_LINK_MODE=symlink
          export UV_CACHE_DIR=/workspace/dataset/.uv_cache
          export UV_PYTHON_INSTALL_DIR=/workspace/dataset/.uv_python
          export MEGATRON_PATH=/workspace/dataset/Megatron-LM
          bash requirements/install.sh agentic
          source .venv/bin/activate
          uv pip install transformers==4.57.1
          uv pip install bitsandbytes

      - name: SFT Robo2vlm train test
        timeout-minutes: 20
        run: |
          unset PYTHONPATH
          export REPO_PATH=$(pwd)
          source .venv/bin/activate
          bash tests/e2e_tests/sft/run_vlm_sft.sh robo2vlm_sft_train

      - name: SFT Robo2vlm Eval test
        timeout-minutes: 20
        run: |
          unset PYTHONPATH
          export REPO_PATH=$(pwd)
          source .venv/bin/activate
          bash tests/e2e_tests/sft/run_vlm_sft.sh robo2vlm_sft_eval
      
      - name: SFT Megatron-bridge Eval test
        timeout-minutes: 20
        run: |
          unset PYTHONPATH
          export REPO_PATH=$(pwd)
          source .venv/bin/activate
          export PYTHONPATH=/workspace/dataset/Megatron-Bridge-0.3.0/src:$PYTHONPATH
          export PYTHONPATH=/workspace/dataset/Megatron-LM-b0cc2706ddc60d2aefd5fff346445b5c013036a8:$PYTHONPATH
          export CUDA_DEVICE_MAX_CONNECTIONS=1
          bash tests/e2e_tests/sft/run_vlm_sft.sh robo2vlm_sft_megatron_bridge_train
          rm -rf /workspace/results/qwen3_vl_megatron_sft/

      - name: Clean up
        run: |
          rm -rf .venv
          uv cache prune

  sft-maniskill-reward-model-test:
    runs-on: embodied
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Create reward model environment
        run: |
          unset UV_DEFAULT_INDEX
          export UV_PATH=/workspace/dataset/.uv
          export UV_LINK_MODE=symlink
          export UV_CACHE_DIR=/workspace/dataset/.uv_cache
          export UV_PYTHON_INSTALL_DIR=/workspace/dataset/.uv_python
          export LIBERO_PATH=/workspace/dataset/LIBERO
          bash requirements/install.sh embodied --model openvla --env maniskill_libero

      - name: ResNet Reward Model Training test
        timeout-minutes: 20
        run: |
          unset PYTHONPATH
          export REPO_PATH=$(pwd)
          source .venv/bin/activate
          bash tests/e2e_tests/sft/run_reward_training.sh resnet_reward_training

      - name: ResNet Reward Model Inference in PPO test
        timeout-minutes: 20
        run: |
          unset PYTHONPATH
          export REPO_PATH=$(pwd)
          source .venv/bin/activate
          bash tests/e2e_tests/embodied/run.sh maniskill_ppo_mlp_resnet_reward

      - name: Clean up
        run: |
          rm -rf .venv
          uv cache prune
