left_glove:
  calibration:
    thumb:
      rotate:
        calibration: {min: 3400, max: 3350}
        clip:
          source: {min: 0.7, max: 1.0}
          target: {min: 0.0, max: 1.0}
      back:
        calibration: {min: 3100, max: 2000}
        clip:
          source: {min: 0.2, max: 0.7}
          target: {min: 0.0, max: 1.0}
      side:
        calibration: {min: 1900, max: 2150}
        clip:
          source: {min: 0.0, max: 1.0}
          target: {min: 0.0, max: 1.0}
    index:
      back:
        calibration: {min: 3100, max: 1200}
        clip:
          source: {min: 0.2, max: 0.8}
          target: {min: 0.0, max: 1.0}
    middle:
      back:
        calibration: {min: 3100, max: 1200}
        clip:
          source: {min: 0.2, max: 0.8}
          target: {min: 0.0, max: 1.0}
    ring:
      back:
        calibration: {min: 3100, max: 1200}
        clip:
          source: {min: 0.2, max: 0.8}
          target: {min: 0.0, max: 1.0}
    pinky:
      back:
        calibration: {min: 3100, max: 1200}
        clip:
          source: {min: 0.2, max: 0.8}
          target: {min: 0.0, max: 1.0}


