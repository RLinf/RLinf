defaults:
  - env/libero_spatial@env.train
  - env/libero_spatial@env.eval
  - model/evo1@actor.model
  - hybrid_engines/fsdp@actor.fsdp_config
  - weight_syncer/patch_syncer@weight_syncer
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:REPO_PATH}/examples/embodiment/config

cluster:
  num_nodes: 1
  component_placement:
    actor,env,rollout: all

runner:
  task_type: embodied
  weight_sync_interval: 1
  logger:
    log_path: /workspace/results/libero_spatial_grpo_evo1
    project_name: rlinf
    experiment_name: "ci-test"
    logger_backends: ["tensorboard"]

  max_epochs: 1
  max_steps: -1
  only_eval: False
  val_check_interval: -1
  save_interval: -1
  resume_dir: null
  ckpt_path: null

algorithm:
  normalize_advantages: True
  kl_penalty: kl
  group_size: 2
  reward_coef: 1.0

  reward_type: chunk_level
  logprob_type: token_level
  entropy_type: token_level

  update_epoch: 1
  adv_type: grpo
  loss_type: actor
  loss_agg_func: "token-mean"
  kl_beta: 0.0
  entropy_bonus: 0
  clip_ratio_high: 0.28
  clip_ratio_low: 0.2
  clip_ratio_c: 3.0
  value_clip: 0.2
  huber_delta: 10.0

  gamma: 0.99
  gae_lambda: 0.95

  filter_rewards: True
  rewards_lower_bound: 0.1
  rewards_upper_bound: 0.9
env:
  group_name: "EnvGroup"
  enable_offload: False
  train:
    rollout_epoch: 1
    total_num_envs: 8
    reward_coef: ${algorithm.reward_coef}
    group_size: ${algorithm.group_size}
    max_episode_steps: 14           # multiple of num_action_chunks=14
    max_steps_per_rollout_epoch: 14
  eval:
    rollout_epoch: 1
    total_num_envs: 1
    auto_reset: True
    ignore_terminations: True
    max_episode_steps: 14
    max_steps_per_rollout_epoch: 14
    group_size: 1
    is_eval: True
    video_cfg:
      save_video: False
      video_base_dir: ${runner.logger.log_path}/video/eval

rollout:
  group_name: "RolloutGroup"
  generation_backend: "huggingface"
  recompute_logprobs: False
  unnorm_key: libero_10
  enable_offload: False
  pipeline_stage_num: 1
  model:
    model_path: /workspace/dataset/Evo1_LIBERO
    precision: ${actor.model.precision}

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 1
  global_batch_size: 8
  seed: 42
  enable_offload: False

  model:
    model_path: /workspace/dataset/Evo1_LIBERO
    num_action_chunks: 14
    add_value_head: False

  optim:
    lr: 5.0e-6
    value_lr: 1.0e-4
    adam_beta1: 0.9
    adam_beta2: 0.95
    adam_eps: 1.0e-08
    weight_decay: 0.01
    clip_grad: 1.0

  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "no_shard"
    gradient_checkpointing: False
    use_orig_params: True
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

reward:
  use_reward_model: False

critic:
  use_critic_model: False
