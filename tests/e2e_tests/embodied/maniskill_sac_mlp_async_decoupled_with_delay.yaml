defaults:
  - env/maniskill_pick_cube@env.train
  - env/maniskill_pick_cube@env.eval
  - model/mlp_policy@actor.model
  - hybrid_engines/fsdp@actor.fsdp_config
  - weight_syncer/patch_syncer@weight_syncer
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:REPO_PATH}/examples/embodiment/config

cluster:
  num_nodes: 1
  component_placement:
    actor: 0
    rollout: 1:0-1
    env: 1:0-1

net_emulation:
  enabled: true
  symmetric: true
  proxy:
    node_rank: 0
    num_cpus: 1
    name: "NetEmulationProxy"
  crossdc_pairs:
    - src: ["Env:0", "Env:1"]
      dst: ["Rollout:0", "Rollout:1", "Actor:0"]
      delay_ms: 10
  bandwidth_groups:
    - members: ["Env:0", "Env:1"]
      bandwidth_mbps: 1000
    - members: ["Rollout:0", "Rollout:1", "Actor:0"]
      bandwidth_mbps: 1000

runner:
  task_type: embodied
  enable_decoupled_mode: true
  logger:
    log_path: /workspace/results/maniskill_sac_mlp_async_decoupled_with_delay
    project_name: rlinf
    experiment_name: "ci-test-real-sim-delay"
    logger_backends: ["tensorboard"]

  max_epochs: 5
  max_steps: -1

  only_eval: False
  val_check_interval: -1
  save_interval: -1

algorithm:
  update_epoch: 32
  group_size: 1
  agg_q: min

  adv_type: embodied_sac
  loss_type: embodied_sac
  loss_agg_func: "token-mean"
  
  bootstrap_type: always
  gamma: 0.8
  tau: 0.01  # Soft update coefficient for target networks

  entropy_tuning:
    alpha_type: softplus # choose from ["softplus", "exp", "fixed_alpha"], set to "softplus" or "exp" to enable automatic entropy tuning
    initial_alpha: 0.01  # Initial temperature value
    target_entropy: -4  # Target entropy (-action_dim)
    optim:
      lr: 3.0e-4  # Learning rate for temperature parameter
      lr_scheduler: torch_constant
      clip_grad: 10.0
  
  # Replay buffer settings
  replay_buffer:
    enable_cache: True
    cache_size: 5000 # number of trajectories cached in memory
    sample_window_size: 5000 # number of latest trajectories to sample from for replay buffer
    min_buffer_size: 1  # Minimum buffer size before training starts
    auto_save: False

  target_update_freq: 1  # Frequency of target network updates

env:
  group_name: "EnvGroup"
  delay_sampler:
    type: uniform
    min_delay: 0.1
    max_delay: 0.2

  train:
    rollout_epoch: 1
    total_num_envs: 40
    auto_reset: True
    ignore_terminations: True
    use_fixed_reset_state_ids: False
    max_episode_steps: 50
    max_steps_per_rollout_epoch: 50

  eval:
    rollout_epoch: 1
    total_num_envs: 80
    auto_reset: True
    ignore_terminations: True
    max_episode_steps: 50
    max_steps_per_rollout_epoch: 50
    use_fixed_reset_state_ids: True
    group_size: 1

rollout:
  enable_torch_compile: True
  enable_cuda_graph: False
  group_name: "RolloutGroup"
  backend: "huggingface"
  enable_offload: False
  pipeline_stage_num: 1
  rollout_queue_size: 5

  collect_transitions: True
  collect_prev_infos: False

  model:
    model_path: ""
    precision: ${actor.model.precision}

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 1024
  global_batch_size: 1024
  seed: 1234
  enable_offload: False

  model:
    model_name: "mlp_policy"
    policy_setup: "panda-ee-dpos"
    action_dim: 4
    
    precision: "32"
    add_value_head: False
    add_q_head: True


  optim:
    clip_grad: 10.0
    lr: 1e-3
    lr_scheduler: torch_constant

  critic_optim:
    clip_grad: 10.0
    lr: 3e-4
    lr_scheduler: torch_constant

  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "no_shard"
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

reward:
  use_reward_model: False

critic:
  use_critic_model: False
