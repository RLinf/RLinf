defaults:
  - env/maniskill_rlt_joint@env.train
  - env/maniskill_rlt_joint@env.eval
  - model/rlt_stage2_joint@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - weight_syncer/patch_syncer@weight_syncer
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:REPO_PATH}/examples/embodiment/config

cluster:
  num_nodes: 1
  component_placement:
    actor: 0-0
    env: 0-1
    rollout: 0-1

runner:
  task_type: embodied
  logger:
    log_path: /workspace/results/rlt_stage2_maniskill_joint
    project_name: rlinf
    experiment_name: "rlt_stage2_maniskill_joint_ci"
    logger_backends: ["tensorboard"]

  max_epochs: 2
  max_steps: -1
  only_eval: False
  weight_sync_interval: 1
  val_check_interval: -1
  eval_before_train: False
  save_interval: -1
  resume_dir: null
  ckpt_path: null

algorithm:
  update_epoch: 1
  max_updates_per_train_step: 1
  warmup_min_size: 1
  warmup_post_collect_updates: 0
  train_every_episodes: 0
  train_every_transitions: 1
  group_size: 1
  rollout_epoch: 1
  eval_rollout_epoch: 1
  adv_type: rlt_td3
  loss_type: rlt_td3
  loss_agg_func: "token-mean"
  actor_only_train_model: True
  gamma: 0.99
  tau: 0.005
  critic_actor_ratio: 1
  actor_loss_warmup_updates: 0
  actor_loss_ramp_updates: 0
  target_update_freq: 1
  intervention:
    enable: False
    mode: local_correction
  replay_buffer:
    enable_cache: False
    cache_size: 64
    sample_window_size: 64
    min_buffer_size: 1
    auto_save: False
  sampling_params:
    do_sample: True
    temperature_train: 1.0
    temperature_eval: 0.0
    top_k: 1
    top_p: 1.0
    repetition_penalty: 1.0
  length_params:
    max_new_token: null
    max_length: 1024
    min_length: 1

env:
  group_name: "EnvGroup"
  train:
    total_num_envs: 2
    seed: 20260604
    auto_reset: False
    ignore_terminations: False
    use_fixed_reset_state_ids: False
    wrap_obs_mode: rlt_openpi_joint
    reward_mode: only_success
    max_episode_steps: 10
    max_steps_per_rollout_epoch: 10
    init_params:
      id: "PegInsertionSideWideClearance-v1"
      obs_mode: "rgb"
      control_mode: "pd_joint_delta_pos"
      reward_mode: "sparse"
      sim_config:
        sim_freq: 100
        control_freq: 10
      sensor_configs:
        width: 384
        height: 384
  eval:
    total_num_envs: 2
    seed: 2026
    auto_reset: False
    ignore_terminations: False
    use_fixed_reset_state_ids: True
    wrap_obs_mode: rlt_openpi_joint
    reward_mode: only_success
    max_episode_steps: 10
    max_steps_per_rollout_epoch: 10
    policy_mode: eval
    action_exec_chunks: 10
    group_size: 1
    video_cfg:
      save_video: False
    init_params:
      id: "PegInsertionSideWideClearance-v1"
      obs_mode: "rgb"
      control_mode: "pd_joint_delta_pos"
      reward_mode: "sparse"
      sim_config:
        sim_freq: 100
        control_freq: 10
      sensor_configs:
        width: 384
        height: 384

rollout:
  group_name: "RolloutGroup"
  generation_backend: "huggingface"
  enable_offload: False
  pipeline_stage_num: 1
  collect_transitions: True
  collect_prev_infos: True
  model:
    model_path: ${actor.model.model_path}
    precision: ${actor.model.precision}
  enable_torch_compile: False
  enable_cuda_graph: False

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 1
  global_batch_size: 2
  seed: 1234
  enable_offload: False
  model:
    model_path: ${oc.env:RLT_STAGE2_STUDENT_MODEL,/workspace/dataset/rlt_maniskill_joint_pi05_sft}
    precision: null
    load_to_device: True
    num_action_chunks: 10
    action_dim: 8
    add_value_head: False
    policy_setup: "panda-qpos"
    num_steps: 5
    rlt_stage2:
      config_name: "pi05_rlt_maniskill_joint"
      norm_stats_path: ${oc.env:RLT_MANISKILL_JOINT_NORM_STATS,/workspace/dataset/data/sft-ci-data/rlt_maniskill_joint/norm_stats.json}
      rl_token_path: ${oc.env:RLT_STAGE1_RL_TOKEN_PATH,/workspace/dataset/rlt_stage1_maniskill_joint/checkpoints/global_step_1/actor/rl_token/rl_token_model.pt}
      num_images_in_input: 2
      proprio_dim: 9
      embedding_dim: 2048
      encoder_layers: 2
      encoder_heads: 8
      decoder_layers: 2
      decoder_heads: 8
      mlp_hidden_dim: 256
      mlp_num_hidden_layers: 2
      actor_noise_sigma: 0.002
      ref_action_dropout: 0.0
      bc_regularizer_beta: 3.0
      warmup_bc_weight: 7.0
      warmup_q_weight: 0.05
      online_bc_weight: 2.7
      online_q_weight: 0.13
      delta_weight: 0.1
      critic_updates_per_actor: 1
      replay_subsample_stride: 0
      replay_allow_terminal_partial: True
      replay_feature_batch_size: 2
      buffer_capacity: 64
      tau: 0.005
      gamma: 0.99

  optim:
    clip_grad: 10.0
    lr: 5.0e-5
    lr_scheduler: torch_constant

  critic_optim:
    clip_grad: 10.0
    lr: 5.0e-5
    lr_scheduler: torch_constant

  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "no_shard"
    use_orig_params: True
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

reward:
  use_reward_model: False

critic:
  use_critic_model: False
