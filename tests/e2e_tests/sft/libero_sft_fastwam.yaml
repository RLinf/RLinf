# One real FastWAM FSDP optimizer step: checkpoint load, dataset decode, forward,
# backward, gradient reduction, and optimizer update.
defaults:
  - hybrid_engines/fsdp@actor.fsdp_config
  - model/fastwam@actor.model
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:REPO_PATH}/examples/sft/config

cluster:
  num_nodes: 1
  component_placement:
    actor: 0-1

runner:
  task_type: sft
  logger:
    log_path: "/workspace/results/fastwam_sft"
    project_name: rlinf
    experiment_name: "libero_sft_fastwam"
    logger_backends: ["tensorboard"]

  max_epochs: -1
  max_steps: 1
  val_check_interval: -1
  save_interval: -1
  log_interval: 1
  resume_dir: null

data:
  train_data_paths: /workspace/dataset/data/sft-ci-data/fastwam-libero
  text_embedding_cache_dir: /workspace/dataset/FastWAM/text_embeds_cache/libero
  num_workers: 0

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 1
  global_batch_size: 2
  seed: 42

  model:
    model_type: "fastwam"
    model_path: /workspace/dataset/FastWAM/checkpoints/libero_uncond_2cam224.pt
    dataset_stats_path: /workspace/dataset/FastWAM/checkpoints/libero_uncond_2cam224_dataset_stats.json

  optim:
    lr: 1.0e-5
    adam_beta1: 0.9
    adam_beta2: 0.95
    adam_eps: 1.0e-08
    weight_decay: 1.0e-2
    clip_grad: 1.0
    lr_scheduler: "cosine"
    lr_warmup_steps: -1
    lr_warmup_steps_ratio: 0.05
    total_training_steps: 1

  fsdp_config:
    strategy: "fsdp2"
    # FastWAM's MoT accesses expert blocks directly, so shard only the root.
    wrap_policy:
      no_split_names: ["__none__"]
    use_orig_params: true
    gradient_checkpointing: true
    gradient_checkpointing_use_reentrant: true
    limit_all_gathers: false
    forward_prefetch: true
    backward_prefetch: "pre"
    reshard_after_forward: true
    save_full_model_weights: false
    grad_scaler:
      enabled: false
    mixed_precision:
      param_dtype: bf16
      reduce_dtype: bf16
      buffer_dtype: bf16
    amp_autocast:
      enabled: false
      precision: "bf16"
